name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests with coverage check
        env:
          COVERAGE_THRESHOLD: "80"
        run: |
          go test -short -coverprofile=coverage.out -covermode=atomic \
            ./internal/controller/... \
            ./internal/service/... \
            ./internal/repository/...
          TOTAL=$(go tool cover -func=coverage.out | awk '/^total:/{gsub(/%/,""); print $3}')
          echo "Coverage: ${TOTAL}%  (threshold: ${COVERAGE_THRESHOLD}%)"
          if [ "$(echo "$TOTAL < $COVERAGE_THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "FAIL: coverage ${TOTAL}% is below the required threshold of ${COVERAGE_THRESHOLD}%"
            exit 1
          fi
          echo "PASS: coverage ${TOTAL}% meets the threshold of ${COVERAGE_THRESHOLD}%"

  api-test:
    name: API Tests (k6)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run k6 API test suite via Docker Compose
        run: |
          docker compose -f docker-compose.api-test.yml up \
            --exit-code-from k6 \
            --abort-on-container-exit

      - name: Tear down Docker Compose
        if: always()
        run: docker compose -f docker-compose.api-test.yml down -v --remove-orphans

  ui-test:
    name: UI Tests (Playwright)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Playwright UI test suite via Docker Compose
        run: |
          docker compose -f docker-compose.ui-test.yml up \
            --exit-code-from playwright \
            --abort-on-container-exit

      - name: Upload Allure UI test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-ui-allure-report
          path: tests/ui/allure-results/
          retention-days: 14

      - name: Tear down Docker Compose
        if: always()
        run: docker compose -f docker-compose.ui-test.yml down -v --remove-orphans
