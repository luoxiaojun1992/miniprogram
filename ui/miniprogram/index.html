<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识库小程序</title>
<style>
/* ── CSS Variables ─────────────────────────────────────── */
:root {
  --primary: #07C160;
  --primary-light: #e8f8ef;
  --primary-dark: #06ad56;
  --bg: #f6f6f6;
  --card-bg: #ffffff;
  --text-primary: #1a1a1a;
  --text-secondary: #666666;
  --text-hint: #999999;
  --border: #e8e8e8;
  --danger: #fa5151;
  --warning: #ff9c19;
  --overlay: rgba(0,0,0,0.5);
  --tab-height: 50px;
  --status-bar: 44px;
  --nav-bar: 44px;
  --safe-bottom: 0px;
  --phone-w: 375px;
  --phone-h: 667px;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --transition: .25s ease;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
  background: #1a1a2e;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Phone Frame ───────────────────────────────────────── */
.phone-frame {
  width: var(--phone-w); height: var(--phone-h);
  background: var(--bg);
  border-radius: 40px;
  border: 8px solid #1a1a1a;
  position: relative; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 2px #333;
}
.phone-notch {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 150px; height: 28px;
  background: #1a1a1a;
  border-radius: 0 0 18px 18px; z-index: 100;
}
.phone-notch::after {
  content: ''; position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  width: 60px; height: 6px; background: #333; border-radius: 3px;
}
.status-bar {
  height: var(--status-bar); background: var(--card-bg);
  display: flex; align-items: flex-end; justify-content: center;
  padding-bottom: 4px; font-size: 12px; color: var(--text-primary);
  font-weight: 600; position: relative; z-index: 99;
}

/* ── App Shell ─────────────────────────────────────────── */
.app-container {
  height: calc(var(--phone-h) - 16px);
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}
.nav-bar {
  height: var(--nav-bar); background: var(--card-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; font-weight: 600; color: var(--text-primary);
  border-bottom: 0.5px solid var(--border);
  position: relative; flex-shrink: 0;
}
.nav-bar .back-btn {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; font-size: 20px; color: var(--text-primary);
  cursor: pointer; padding: 4px 8px;
}
.page-body {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}
.page-body::-webkit-scrollbar { display: none; }

/* ── Tab Bar ───────────────────────────────────────────── */
.tab-bar {
  height: var(--tab-height); background: var(--card-bg);
  display: flex; border-top: 0.5px solid var(--border);
  flex-shrink: 0;
}
.tab-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-size: 10px; color: var(--text-hint);
  cursor: pointer; transition: color var(--transition);
  position: relative; background: none; border: none;
  font-family: inherit;
}
.tab-item.active { color: var(--primary); }
.tab-item .tab-icon { font-size: 22px; margin-bottom: 2px; line-height: 1; }
.tab-item .badge {
  position: absolute; top: 4px; right: 50%; transform: translateX(16px);
  background: var(--danger); color: #fff;
  font-size: 10px; min-width: 16px; height: 16px;
  border-radius: 8px; display: flex; align-items: center;
  justify-content: center; padding: 0 4px;
}

/* ── Pages / Views ─────────────────────────────────────── */
.page { display: none; flex-direction: column; height: 100%; }
.page.active { display: flex; }

.detail-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg); z-index: 50;
  display: none; flex-direction: column;
}
.detail-overlay.active { display: flex; }

/* ── Login Page ────────────────────────────────────────── */
.login-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: var(--card-bg); z-index: 80;
  display: none; flex-direction: column; align-items: center;
  justify-content: center; padding: 40px 32px;
}
.login-overlay.active { display: flex; }
.login-logo { font-size: 60px; margin-bottom: 16px; }
.login-title { font-size: 22px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
.login-subtitle { font-size: 14px; color: var(--text-hint); margin-bottom: 40px; }
.btn-wechat {
  width: 100%; padding: 14px; background: var(--primary); color: #fff;
  border: none; border-radius: var(--radius-sm); font-size: 16px;
  font-weight: 600; cursor: pointer; margin-bottom: 16px;
  transition: background var(--transition);
  font-family: inherit;
}
.btn-wechat:active { background: var(--primary-dark); }
.debug-section {
  width: 100%; margin-top: 24px; padding-top: 24px;
  border-top: 1px dashed var(--border);
}
.debug-section label { font-size: 12px; color: var(--text-hint); display: block; margin-bottom: 8px; }
.debug-section input {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 14px; margin-bottom: 12px;
  font-family: inherit;
}
.debug-section input:focus { outline: none; border-color: var(--primary); }
.btn-debug {
  width: 100%; padding: 12px; background: var(--bg); color: var(--text-secondary);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 14px; cursor: pointer; font-family: inherit;
}
.api-base-section {
  width: 100%; margin-top: 16px;
}
.api-base-section label { font-size: 12px; color: var(--text-hint); display: block; margin-bottom: 8px; }
.api-base-section input {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 0;
  font-family: inherit; color: var(--text-secondary);
}
.api-base-section input:focus { outline: none; border-color: var(--primary); }

/* ── Cards ─────────────────────────────────────────────── */
.card {
  background: var(--card-bg); border-radius: var(--radius);
  margin: 12px; padding: 16px; box-shadow: var(--shadow);
  cursor: pointer; transition: transform var(--transition);
}
.card:active { transform: scale(0.98); }
.card-horizontal {
  display: flex; gap: 12px;
}
.card-horizontal .card-img {
  width: 100px; height: 75px; border-radius: var(--radius-sm);
  object-fit: cover; background: var(--bg); flex-shrink: 0;
}
.card-horizontal .card-img-placeholder {
  width: 100px; height: 75px; border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--primary-light), #d4f0e1);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; flex-shrink: 0;
}
.card-body { flex: 1; min-width: 0; }
.card-title {
  font-size: 15px; font-weight: 600; color: var(--text-primary);
  margin-bottom: 4px;
  overflow: hidden; text-overflow: ellipsis;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.card-desc {
  font-size: 12px; color: var(--text-hint); line-height: 1.5;
  overflow: hidden; text-overflow: ellipsis;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.card-meta {
  display: flex; gap: 12px; margin-top: 8px; font-size: 11px;
  color: var(--text-hint); align-items: center;
}
.card-meta span { display: flex; align-items: center; gap: 3px; }
.card-price {
  color: var(--danger); font-weight: 700; font-size: 15px;
}

/* ── Section Headers ───────────────────────────────────── */
.section-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 16px 8px;
}
.section-title { font-size: 17px; font-weight: 700; color: var(--text-primary); }
.section-more { font-size: 13px; color: var(--text-hint); background: none; border: none; cursor: pointer; }

/* ── Module Grid ───────────────────────────────────────── */
.module-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 8px; padding: 8px 16px 16px;
}
.module-item {
  display: flex; flex-direction: column; align-items: center;
  padding: 12px 4px; background: var(--card-bg); border-radius: var(--radius-sm);
  cursor: pointer; transition: transform var(--transition);
  border: none; font-family: inherit;
}
.module-item:active { transform: scale(0.95); }
.module-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; margin-bottom: 6px;
}
.module-name {
  font-size: 11px; color: var(--text-primary); text-align: center;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  max-width: 100%;
}

/* ── Search Bar ────────────────────────────────────────── */
.search-bar {
  display: flex; gap: 8px; padding: 12px; background: var(--card-bg);
  border-bottom: 0.5px solid var(--border);
}
.search-input {
  flex: 1; padding: 8px 12px; background: var(--bg);
  border: none; border-radius: 20px; font-size: 14px;
  font-family: inherit; color: var(--text-primary);
}
.search-input::placeholder { color: var(--text-hint); }
.search-input:focus { outline: none; }
.filter-btn {
  padding: 8px 14px; background: var(--primary-light); color: var(--primary);
  border: none; border-radius: 20px; font-size: 13px;
  cursor: pointer; white-space: nowrap; font-family: inherit;
}
.filter-btn.active { background: var(--primary); color: #fff; }

/* ── Filter Pills ──────────────────────────────────────── */
.filter-pills {
  display: flex; gap: 8px; padding: 8px 12px;
  overflow-x: auto; white-space: nowrap;
  background: var(--card-bg);
}
.filter-pills::-webkit-scrollbar { display: none; }
.pill {
  padding: 6px 14px; border-radius: 20px; font-size: 12px;
  background: var(--bg); color: var(--text-secondary);
  border: none; cursor: pointer; flex-shrink: 0;
  font-family: inherit; transition: all var(--transition);
}
.pill.active { background: var(--primary); color: #fff; }

/* ── Profile Page ──────────────────────────────────────── */
.profile-header {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  padding: 32px 20px 24px; color: #fff; text-align: center;
}
.avatar {
  width: 64px; height: 64px; border-radius: 50%;
  background: rgba(255,255,255,0.3); display: flex;
  align-items: center; justify-content: center;
  font-size: 28px; margin: 0 auto 12px;
  border: 3px solid rgba(255,255,255,0.5);
  overflow: hidden;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.profile-name { font-size: 18px; font-weight: 700; }
.profile-id { font-size: 12px; opacity: 0.8; margin-top: 4px; }
.profile-menu { margin: 12px; }
.menu-item {
  display: flex; align-items: center; padding: 14px 16px;
  background: var(--card-bg); cursor: pointer;
  border: none; width: 100%; font-family: inherit;
  text-align: left; font-size: 15px; color: var(--text-primary);
}
.menu-item:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.menu-item:last-child { border-radius: 0 0 var(--radius) var(--radius); }
.menu-item:not(:last-child) { border-bottom: 0.5px solid var(--border); }
.menu-item .menu-icon { font-size: 20px; margin-right: 12px; width: 24px; text-align: center; }
.menu-item .menu-arrow { margin-left: auto; color: var(--text-hint); font-size: 14px; }
.menu-item .menu-badge {
  margin-left: auto; margin-right: 8px; background: var(--danger);
  color: #fff; font-size: 10px; min-width: 18px; height: 18px;
  border-radius: 9px; display: flex; align-items: center;
  justify-content: center; padding: 0 5px;
}
.logout-btn {
  display: block; width: calc(100% - 24px); margin: 20px 12px;
  padding: 14px; background: var(--card-bg); color: var(--danger);
  border: none; border-radius: var(--radius); font-size: 15px;
  cursor: pointer; font-family: inherit; font-weight: 500;
}

/* ── Detail Page ───────────────────────────────────────── */
.detail-cover {
  width: 100%; height: 180px; object-fit: cover; background: var(--bg);
}
.detail-cover-placeholder {
  width: 100%; height: 180px;
  background: linear-gradient(135deg, var(--primary-light), #d4f0e1);
  display: flex; align-items: center; justify-content: center;
  font-size: 48px;
}
.detail-content { padding: 16px; }
.detail-title { font-size: 20px; font-weight: 700; color: var(--text-primary); line-height: 1.4; margin-bottom: 12px; }
.detail-info {
  display: flex; gap: 12px; font-size: 12px; color: var(--text-hint);
  margin-bottom: 16px; flex-wrap: wrap; align-items: center;
}
.detail-info .author-avatar {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--primary-light); display: inline-flex;
  align-items: center; justify-content: center; font-size: 10px;
  overflow: hidden;
}
.detail-info .author-avatar img { width: 100%; height: 100%; object-fit: cover; }
.detail-body {
  font-size: 15px; line-height: 1.8; color: var(--text-primary);
  word-wrap: break-word;
}
.detail-body img { max-width: 100%; height: auto; border-radius: var(--radius-sm); }
.detail-actions {
  display: flex; gap: 0; border-top: 0.5px solid var(--border);
  background: var(--card-bg); flex-shrink: 0;
}
.action-btn {
  flex: 1; padding: 12px; background: none; border: none;
  font-size: 13px; color: var(--text-secondary); cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  font-family: inherit; transition: color var(--transition);
}
.action-btn.active { color: var(--primary); }
.action-btn .action-icon { font-size: 20px; }

/* ── Comments ──────────────────────────────────────────── */
.comments-section { padding: 16px; }
.comments-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: var(--text-primary); }
.comment-item {
  display: flex; gap: 10px; padding: 12px 0;
  border-bottom: 0.5px solid var(--border);
}
.comment-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--primary-light); display: flex;
  align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0; overflow: hidden;
}
.comment-avatar img { width: 100%; height: 100%; object-fit: cover; }
.comment-body { flex: 1; min-width: 0; }
.comment-author { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.comment-text { font-size: 14px; color: var(--text-secondary); margin-top: 4px; line-height: 1.5; }
.comment-time { font-size: 11px; color: var(--text-hint); margin-top: 4px; }
.comment-input-bar {
  display: flex; gap: 8px; padding: 10px 12px;
  background: var(--card-bg); border-top: 0.5px solid var(--border);
  flex-shrink: 0;
}
.comment-input {
  flex: 1; padding: 8px 14px; background: var(--bg);
  border: none; border-radius: 20px; font-size: 14px;
  font-family: inherit;
}
.comment-input:focus { outline: none; }
.comment-send {
  padding: 8px 16px; background: var(--primary); color: #fff;
  border: none; border-radius: 20px; font-size: 13px;
  cursor: pointer; font-family: inherit; white-space: nowrap;
}
.comment-send:disabled { opacity: 0.5; }

/* ── Units List ────────────────────────────────────────── */
.unit-list { padding: 0 16px 16px; }
.unit-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px; background: var(--card-bg);
  border-radius: var(--radius-sm); margin-bottom: 8px;
}
.unit-index {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--primary-light); color: var(--primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0;
}
.unit-info { flex: 1; min-width: 0; }
.unit-title { font-size: 14px; color: var(--text-primary); }
.unit-duration { font-size: 12px; color: var(--text-hint); margin-top: 2px; }

/* ── Loading / Empty / Toast ───────────────────────────── */
.loading {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 40px; color: var(--text-hint);
}
.spinner {
  width: 24px; height: 24px; border: 3px solid var(--border);
  border-top-color: var(--primary); border-radius: 50%;
  animation: spin .6s linear infinite; margin-bottom: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 60px 20px; color: var(--text-hint);
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state .empty-text { font-size: 14px; }
.toast {
  position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.75); color: #fff; padding: 10px 20px;
  border-radius: var(--radius-sm); font-size: 14px; z-index: 200;
  opacity: 0; transition: opacity .3s; pointer-events: none;
  max-width: 80%; text-align: center;
}
.toast.show { opacity: 1; }
.refresh-btn {
  display: block; margin: 0 auto; padding: 8px 20px;
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 20px; font-size: 13px; color: var(--text-secondary);
  cursor: pointer; font-family: inherit;
}
.load-more {
  text-align: center; padding: 16px; font-size: 13px;
  color: var(--text-hint);
}
.list-end { text-align: center; padding: 16px; font-size: 12px; color: var(--text-hint); }
</style>
</head>
<body>

<div class="phone-frame" id="app">
  <div class="phone-notch"></div>
  <div class="status-bar" id="statusBarTime"></div>
  <div class="app-container">
    <!-- ── Login Overlay ───────────────────────────────── -->
    <div class="login-overlay" id="loginPage">
      <div class="login-logo">📚</div>
      <div class="login-title">知识库小程序</div>
      <div class="login-subtitle">登录以获取完整体验</div>
      <button class="btn-wechat" id="btnWechatLogin">💬 微信一键登录</button>
      <div class="debug-section">
        <label>🛠 开发调试 — 输入用户ID获取Token</label>
        <input type="number" id="debugUserIdInput" placeholder="用户ID (如: 1)">
        <button class="btn-debug" id="btnDebugLogin">获取调试Token</button>
      </div>
      <div class="api-base-section">
        <label>⚙ API 地址</label>
        <input type="text" id="apiBaseInput" placeholder="http://localhost:8080/v1">
      </div>
    </div>

    <!-- ── Toast ───────────────────────────────────────── -->
    <div class="toast" id="toast"></div>

    <!-- ── Tab Pages ───────────────────────────────────── -->
    <!-- HOME -->
    <div class="page active" id="pageHome">
      <div class="nav-bar">首页</div>
      <div class="page-body" id="homeBody">
        <div style="padding:12px 12px 4px;"><button class="refresh-btn" id="homeRefresh">↻ 刷新</button></div>
        <div class="section-header"><span class="section-title">📂 知识模块</span></div>
        <div class="module-grid" id="homeModules"></div>
        <div class="section-header">
          <span class="section-title">📝 推荐文章</span>
          <button class="section-more" id="homeMoreArticles">查看更多 ›</button>
        </div>
        <div id="homeFeatured"></div>
      </div>
    </div>

    <!-- ARTICLES -->
    <div class="page" id="pageArticles">
      <div class="nav-bar">文章</div>
      <div class="search-bar">
        <input class="search-input" id="articleSearch" placeholder="搜索文章...">
        <button class="filter-btn" id="articleFilterToggle">筛选</button>
      </div>
      <div class="filter-pills" id="articleFilters" style="display:none;"></div>
      <div class="page-body" id="articlesBody">
        <div id="articlesList"></div>
        <div class="load-more" id="articlesLoadMore" style="display:none;">
          <button class="refresh-btn" id="articlesLoadBtn">加载更多</button>
        </div>
        <div class="list-end" id="articlesEnd" style="display:none;">— 已经到底了 —</div>
      </div>
    </div>

    <!-- COURSES -->
    <div class="page" id="pageCourses">
      <div class="nav-bar">课程</div>
      <div class="search-bar">
        <input class="search-input" id="courseSearch" placeholder="搜索课程...">
      </div>
      <div class="page-body" id="coursesBody">
        <div id="coursesList"></div>
        <div class="load-more" id="coursesLoadMore" style="display:none;">
          <button class="refresh-btn" id="coursesLoadBtn">加载更多</button>
        </div>
        <div class="list-end" id="coursesEnd" style="display:none;">— 已经到底了 —</div>
      </div>
    </div>

    <!-- PROFILE -->
    <div class="page" id="pageProfile">
      <div class="nav-bar">我的</div>
      <div class="page-body" id="profileBody">
        <div class="profile-header" id="profileHeader">
          <div class="avatar" id="profileAvatar">👤</div>
          <div class="profile-name" id="profileName">未登录</div>
          <div class="profile-id" id="profileId"></div>
        </div>
        <div class="profile-menu">
          <button class="menu-item" id="menuCollections">
            <span class="menu-icon">⭐</span> 我的收藏 <span class="menu-arrow">›</span>
          </button>
          <button class="menu-item" id="menuStudy">
            <span class="menu-icon">📖</span> 学习记录 <span class="menu-arrow">›</span>
          </button>
          <button class="menu-item" id="menuNotifications">
            <span class="menu-icon">🔔</span> 我的消息
            <span class="menu-badge" id="notifBadge" style="display:none;">0</span>
            <span class="menu-arrow">›</span>
          </button>
        </div>
        <button class="logout-btn" id="btnLogout">退出登录</button>
      </div>

<script>
/* ═══════════════════════════════════════════════════════════
   App State & Configuration
   ═══════════════════════════════════════════════════════════ */
const DEFAULT_API_BASE = 'http://localhost:8080/v1';
const PAGE_SIZE = 20;
const DEFAULT_TOAST_DURATION = 2000;
const TOKEN_REFRESH_BUFFER_MS = 5 * 60 * 1000;
const SCROLL_LOAD_THRESHOLD = 100;
const MAX_BADGE_COUNT = 99;
const SECONDS_PER_MINUTE = 60;
const SECONDS_PER_HOUR = 3600;
const SECONDS_PER_DAY = 86400;
const SECONDS_PER_MONTH = 2592000;

const state = {
  apiBase: localStorage.getItem('api_base') || DEFAULT_API_BASE,
  token: localStorage.getItem('access_token') || '',
  user: null,
  currentTab: 'home',
  modules: [],
  // Articles
  articles: [], articlesPage: 1, articlesHasNext: true, articlesKeyword: '', articlesModuleId: 0,
  // Courses
  courses: [], coursesPage: 1, coursesHasNext: true, coursesKeyword: '',
  // Detail
  currentArticle: null, currentCourse: null,
  articleLiked: false, articleCollected: false,
  courseLiked: false, courseCollected: false,
  // Notifications
  unreadCount: 0,
};

/* ═══════════════════════════════════════════════════════════
   Utility Helpers
   ═══════════════════════════════════════════════════════════ */
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

function formatTime(t) {
  if (!t) return '';
  const d = new Date(t);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < SECONDS_PER_MINUTE) return '刚刚';
  if (diff < SECONDS_PER_HOUR) return Math.floor(diff / SECONDS_PER_MINUTE) + '分钟前';
  if (diff < SECONDS_PER_DAY) return Math.floor(diff / SECONDS_PER_HOUR) + '小时前';
  if (diff < SECONDS_PER_MONTH) return Math.floor(diff / SECONDS_PER_DAY) + '天前';
  return d.toLocaleDateString('zh-CN');
}

function formatCount(n) {
  if (!n || n === 0) return '0';
  if (n >= 10000) return (n / 10000).toFixed(1) + 'w';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return String(n);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Status bar clock
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  $('#statusBarTime').textContent = h + ':' + m;
}
updateClock();
setInterval(updateClock, 30000);

// Toast
let toastTimer = null;
function showToast(msg, duration) {
  duration = duration || DEFAULT_TOAST_DURATION;
  const el = $('#toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

function loadingHtml() {
  return '<div class="loading"><div class="spinner"></div><span>加载中...</span></div>';
}

function emptyHtml(text) {
  return '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">' + escapeHtml(text || '暂无内容') + '</div></div>';
}

/* Module colors for visual distinction */
const MODULE_COLORS = [
  '#07C160', '#1989fa', '#ff976a', '#ee0a24',
  '#7232dd', '#f2826a', '#4fc08d', '#e6a23c'
];
const MODULE_ICONS = ['📘', '📗', '📕', '📙', '📓', '📔', '📒', '📚'];

/* ═══════════════════════════════════════════════════════════
   API Layer
   ═══════════════════════════════════════════════════════════ */
async function api(method, path, body) {
  const url = state.apiBase + path;
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (state.token) {
    opts.headers['Authorization'] = 'Bearer ' + state.token;
  }
  if (body && method !== 'GET') {
    opts.body = JSON.stringify(body);
  }

  let resp;
  try {
    resp = await fetch(url, opts);
  } catch (e) {
    throw new Error('网络请求失败: ' + e.message);
  }

  if (resp.status === 401) {
    state.token = '';
    localStorage.removeItem('access_token');
    showLogin();
    throw new Error('登录已过期，请重新登录');
  }

  const json = await resp.json();
  if (json.code !== 0) {
    throw new Error(json.message || '请求失败');
  }
  return json.data;
}

function apiGet(path) { return api('GET', path); }
function apiPost(path, body) { return api('POST', path, body); }
function apiPut(path, body) { return api('PUT', path, body); }
function apiDelete(path) { return api('DELETE', path); }

/* ═══════════════════════════════════════════════════════════
   Auth / Login
   ═══════════════════════════════════════════════════════════ */
function showLogin() {
  $('#loginPage').classList.add('active');
  $('#apiBaseInput').value = state.apiBase;
}

function hideLogin() {
  $('#loginPage').classList.remove('active');
}

function saveToken(data) {
  state.token = data.access_token;
  localStorage.setItem('access_token', data.access_token);
  if (data.user_info) state.user = data.user_info;
}

$('#btnWechatLogin').addEventListener('click', async () => {
  updateApiBase();
  try {
    showToast('正在登录...');
    const data = await apiPost('/auth/wechat-login', { code: 'simulated_code_' + Date.now() });
    saveToken(data);
    hideLogin();
    showToast('登录成功');
    initApp();
  } catch (e) {
    showToast(e.message);
  }
});

$('#btnDebugLogin').addEventListener('click', async () => {
  updateApiBase();
  const userId = parseInt($('#debugUserIdInput').value);
  if (!userId) { showToast('请输入用户ID'); return; }
  try {
    showToast('正在获取Token...');
    const data = await apiPost('/debug/token', { user_id: userId });
    saveToken(data);
    hideLogin();
    showToast('调试登录成功');
    initApp();
  } catch (e) {
    showToast(e.message);
  }
});

function updateApiBase() {
  const val = $('#apiBaseInput').value.trim();
  if (val) {
    state.apiBase = val.replace(/\/+$/, '');
    localStorage.setItem('api_base', state.apiBase);
  }
}

$('#btnLogout').addEventListener('click', () => {
  state.token = '';
  state.user = null;
  localStorage.removeItem('access_token');
  showLogin();
  showToast('已退出登录');
});

/* Token refresh: schedule a refresh 5 minutes before expiry */
function scheduleTokenRefresh() {
  if (!state.token) return;
  try {
    const payload = JSON.parse(atob(state.token.split('.')[1]));
    const exp = payload.exp * 1000;
    const refreshAt = exp - TOKEN_REFRESH_BUFFER_MS;
    const delay = refreshAt - Date.now();
    if (delay > 0) {
      setTimeout(async () => {
        try {
          const data = await apiPost('/auth/refresh');
          saveToken(data);
          scheduleTokenRefresh();
        } catch (_) { /* will redirect to login on 401 */ }
      }, delay);
    }
  } catch (_) { /* invalid token format */ }
}

/* ═══════════════════════════════════════════════════════════
   Tab Navigation
   ═══════════════════════════════════════════════════════════ */
const TAB_MAP = { home: 'pageHome', articles: 'pageArticles', courses: 'pageCourses', profile: 'pageProfile' };

$$('.tab-item').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

function switchTab(tab) {
  state.currentTab = tab;
  $$('.tab-item').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  Object.entries(TAB_MAP).forEach(([k, id]) => {
    document.getElementById(id).classList.toggle('active', k === tab);
  });
  // Close any open detail overlays
  $$('.detail-overlay').forEach(o => o.classList.remove('active'));
  // Trigger page load if needed
  if (tab === 'articles' && state.articles.length === 0) loadArticles(true);
  if (tab === 'courses' && state.courses.length === 0) loadCourses(true);
  if (tab === 'profile') loadProfile();
}

/* ═══════════════════════════════════════════════════════════
   HOME PAGE
   ═══════════════════════════════════════════════════════════ */
async function loadHome() {
  const modulesContainer = $('#homeModules');
  const featuredContainer = $('#homeFeatured');
  modulesContainer.innerHTML = loadingHtml();
  featuredContainer.innerHTML = loadingHtml();

  try {
    const modulesData = await apiGet('/modules');
    const modules = modulesData && modulesData.list ? modulesData.list : (Array.isArray(modulesData) ? modulesData : []);
    state.modules = modules;
    if (modules.length === 0) {
      modulesContainer.innerHTML = emptyHtml('暂无模块');
    } else {
      modulesContainer.innerHTML = modules.map((m, i) => `
        <button class="module-item" data-module-id="${m.id}">
          <div class="module-icon" style="background:${MODULE_COLORS[i % MODULE_COLORS.length]}20; color:${MODULE_COLORS[i % MODULE_COLORS.length]}">${MODULE_ICONS[i % MODULE_ICONS.length]}</div>
          <span class="module-name">${escapeHtml(m.title)}</span>
        </button>
      `).join('');
      modulesContainer.querySelectorAll('.module-item').forEach(el => {
        el.addEventListener('click', () => {
          switchTab('articles');
          state.articlesModuleId = parseInt(el.dataset.moduleId);
          loadArticles(true);
          updateArticleFilters();
        });
      });
    }
  } catch (e) {
    modulesContainer.innerHTML = emptyHtml('加载失败: ' + e.message);
  }

  try {
    const articlesData = await apiGet('/articles?page_size=5');
    const articles = articlesData && articlesData.list ? articlesData.list : (Array.isArray(articlesData) ? articlesData : []);
    if (articles.length === 0) {
      featuredContainer.innerHTML = emptyHtml('暂无文章');
    } else {
      featuredContainer.innerHTML = articles.map(a => articleCardHtml(a)).join('');
      featuredContainer.querySelectorAll('.card').forEach(c => {
        c.addEventListener('click', () => openArticleDetail(parseInt(c.dataset.id)));
      });
    }
  } catch (e) {
    featuredContainer.innerHTML = emptyHtml('加载失败: ' + e.message);
  }
}

function articleCardHtml(a) {
  const img = a.cover_image
    ? `<img class="card-img" src="${escapeHtml(a.cover_image)}" alt="" onerror="this.outerHTML='<div class=\\'card-img-placeholder\\'>📝</div>'">`
    : '<div class="card-img-placeholder">📝</div>';
  return `
    <div class="card card-horizontal" data-id="${a.id}">
      ${img}
      <div class="card-body">
        <div class="card-title">${escapeHtml(a.title)}</div>
        <div class="card-desc">${escapeHtml(a.summary || '')}</div>
        <div class="card-meta">
          <span>👁 ${formatCount(a.view_count)}</span>
          <span>👍 ${formatCount(a.like_count)}</span>
          <span>⭐ ${formatCount(a.collect_count)}</span>
        </div>
      </div>
    </div>`;
}

$('#homeRefresh').addEventListener('click', loadHome);
$('#homeMoreArticles').addEventListener('click', () => switchTab('articles'));

/* ═══════════════════════════════════════════════════════════
   ARTICLES PAGE
   ═══════════════════════════════════════════════════════════ */
let articleSearchTimer = null;
$('#articleSearch').addEventListener('input', (e) => {
  clearTimeout(articleSearchTimer);
  articleSearchTimer = setTimeout(() => {
    state.articlesKeyword = e.target.value.trim();
    loadArticles(true);
  }, 400);
});

$('#articleFilterToggle').addEventListener('click', () => {
  const el = $('#articleFilters');
  const visible = el.style.display !== 'none';
  el.style.display = visible ? 'none' : 'flex';
  $('#articleFilterToggle').classList.toggle('active', !visible);
  if (!visible) updateArticleFilters();
});

function updateArticleFilters() {
  const container = $('#articleFilters');
  const modules = [{ id: 0, title: '全部' }, ...state.modules];
  container.innerHTML = modules.map(m => `
    <button class="pill ${m.id === state.articlesModuleId ? 'active' : ''}" data-module-id="${m.id}">${escapeHtml(m.title)}</button>
  `).join('');
  container.style.display = 'flex';
  $('#articleFilterToggle').classList.add('active');
  container.querySelectorAll('.pill').forEach(p => {
    p.addEventListener('click', () => {
      state.articlesModuleId = parseInt(p.dataset.moduleId);
      container.querySelectorAll('.pill').forEach(pp => pp.classList.toggle('active', parseInt(pp.dataset.moduleId) === state.articlesModuleId));
      loadArticles(true);
    });
  });
}

async function loadArticles(reset) {
  if (reset) {
    state.articles = [];
    state.articlesPage = 1;
    state.articlesHasNext = true;
    $('#articlesList').innerHTML = loadingHtml();
  }
  if (!state.articlesHasNext) return;

  let path = '/articles?page=' + state.articlesPage + '&page_size=' + PAGE_SIZE;
  if (state.articlesKeyword) path += '&keyword=' + encodeURIComponent(state.articlesKeyword);
  if (state.articlesModuleId) path += '&module_id=' + state.articlesModuleId;

  try {
    const data = await apiGet(path);
    const list = data && data.list ? data.list : (Array.isArray(data) ? data : []);
    const pagination = data && data.pagination;
    state.articles = reset ? list : state.articles.concat(list);
    state.articlesHasNext = pagination ? pagination.has_next : list.length >= PAGE_SIZE;
    state.articlesPage++;
    renderArticlesList();
  } catch (e) {
    if (reset) $('#articlesList').innerHTML = emptyHtml('加载失败: ' + e.message);
    showToast(e.message);
  }
}

function renderArticlesList() {
  const container = $('#articlesList');
  if (state.articles.length === 0) {
    container.innerHTML = emptyHtml('暂无文章');
    $('#articlesLoadMore').style.display = 'none';
    $('#articlesEnd').style.display = 'none';
    return;
  }
  container.innerHTML = state.articles.map(a => articleCardHtml(a)).join('');
  container.querySelectorAll('.card').forEach(c => {
    c.addEventListener('click', () => openArticleDetail(parseInt(c.dataset.id)));
  });
  $('#articlesLoadMore').style.display = state.articlesHasNext ? 'block' : 'none';
  $('#articlesEnd').style.display = state.articlesHasNext ? 'none' : 'block';
}

$('#articlesLoadBtn').addEventListener('click', () => loadArticles(false));

// Infinite scroll
$('#articlesBody').addEventListener('scroll', function () {
  if (!state.articlesHasNext) return;
  const el = this;
  if (el.scrollTop + el.clientHeight >= el.scrollHeight - SCROLL_LOAD_THRESHOLD) {
    loadArticles(false);
  }
});

/* ═══════════════════════════════════════════════════════════
   COURSES PAGE
   ═══════════════════════════════════════════════════════════ */
let courseSearchTimer = null;
$('#courseSearch').addEventListener('input', (e) => {
  clearTimeout(courseSearchTimer);
  courseSearchTimer = setTimeout(() => {
    state.coursesKeyword = e.target.value.trim();
    loadCourses(true);
  }, 400);
});

async function loadCourses(reset) {
  if (reset) {
    state.courses = [];
    state.coursesPage = 1;
    state.coursesHasNext = true;
    $('#coursesList').innerHTML = loadingHtml();
  }
  if (!state.coursesHasNext) return;

  let path = '/courses?page=' + state.coursesPage + '&page_size=' + PAGE_SIZE;
  if (state.coursesKeyword) path += '&keyword=' + encodeURIComponent(state.coursesKeyword);

  try {
    const data = await apiGet(path);
    const list = data && data.list ? data.list : (Array.isArray(data) ? data : []);
    const pagination = data && data.pagination;
    state.courses = reset ? list : state.courses.concat(list);
    state.coursesHasNext = pagination ? pagination.has_next : list.length >= PAGE_SIZE;
    state.coursesPage++;
    renderCoursesList();
  } catch (e) {
    if (reset) $('#coursesList').innerHTML = emptyHtml('加载失败: ' + e.message);
    showToast(e.message);
  }
}

function courseCardHtml(c) {
  const img = c.cover_image
    ? `<img class="card-img" src="${escapeHtml(c.cover_image)}" alt="" onerror="this.outerHTML='<div class=\\'card-img-placeholder\\'>🎓</div>'">`
    : '<div class="card-img-placeholder">🎓</div>';
  const price = c.price > 0 ? `<span class="card-price">¥${c.price}</span>` : '<span style="color:var(--primary);font-weight:600;">免费</span>';
  return `
    <div class="card card-horizontal" data-id="${c.id}">
      ${img}
      <div class="card-body">
        <div class="card-title">${escapeHtml(c.title)}</div>
        <div class="card-desc">${escapeHtml(c.description || '')}</div>
        <div class="card-meta">
          <span>📖 ${formatCount(c.study_count)}人学习</span>
          ${price}
        </div>
      </div>
    </div>`;
}

function renderCoursesList() {
  const container = $('#coursesList');
  if (state.courses.length === 0) {
    container.innerHTML = emptyHtml('暂无课程');
    $('#coursesLoadMore').style.display = 'none';
    $('#coursesEnd').style.display = 'none';
    return;
  }
  container.innerHTML = state.courses.map(c => courseCardHtml(c)).join('');
  container.querySelectorAll('.card').forEach(c => {
    c.addEventListener('click', () => openCourseDetail(parseInt(c.dataset.id)));
  });
  $('#coursesLoadMore').style.display = state.coursesHasNext ? 'block' : 'none';
  $('#coursesEnd').style.display = state.coursesHasNext ? 'none' : 'block';
}

$('#coursesLoadBtn').addEventListener('click', () => loadCourses(false));

$('#coursesBody').addEventListener('scroll', function () {
  if (!state.coursesHasNext) return;
  const el = this;
  if (el.scrollTop + el.clientHeight >= el.scrollHeight - SCROLL_LOAD_THRESHOLD) {
    loadCourses(false);
  }
});

/* ═══════════════════════════════════════════════════════════
   ARTICLE DETAIL
   ═══════════════════════════════════════════════════════════ */
async function openArticleDetail(id) {
  const overlay = $('#articleDetail');
  overlay.classList.add('active');
  const body = $('#articleDetailBody');
  body.innerHTML = loadingHtml();
  $('#articleDetailActions').innerHTML = '';

  try {
    const article = await apiGet('/articles/' + id);
    state.currentArticle = article;
    state.articleLiked = !!article.is_liked;
    state.articleCollected = !!article.is_collected;

    const authorAvatarContent = article.author && article.author.avatar_url
      ? `<img src="${escapeHtml(article.author.avatar_url)}" alt="">`
      : '👤';

    body.innerHTML = `
      ${article.cover_image
        ? `<img class="detail-cover" src="${escapeHtml(article.cover_image)}" alt="" onerror="this.outerHTML='<div class=\\'detail-cover-placeholder\\'>📝</div>'">`
        : '<div class="detail-cover-placeholder">📝</div>'}
      <div class="detail-content">
        <div class="detail-title">${escapeHtml(article.title)}</div>
        <div class="detail-info">
          <div class="author-avatar">${authorAvatarContent}</div>
          <span>${escapeHtml(article.author ? article.author.nickname : '匿名')}</span>
          <span>${formatTime(article.publish_time || article.created_at)}</span>
          <span>👁 ${formatCount(article.view_count)}</span>
        </div>
        <div class="detail-body">${article.content || '<p>暂无内容</p>'}</div>
      </div>
      <div class="comments-section">
        <div class="comments-title">💬 评论</div>
        <div id="articleComments">${loadingHtml()}</div>
      </div>`;
    renderArticleActions();
    loadComments(1, id, '#articleComments');
  } catch (e) {
    body.innerHTML = emptyHtml('加载失败: ' + e.message);
  }
}

function renderArticleActions() {
  const a = state.currentArticle;
  if (!a) return;
  $('#articleDetailActions').innerHTML = `
    <button class="action-btn ${state.articleLiked ? 'active' : ''}" id="articleLikeBtn">
      <span class="action-icon">${state.articleLiked ? '👍' : '👍'}</span>
      ${state.articleLiked ? '已赞' : '点赞'} ${formatCount(a.like_count)}
    </button>
    <button class="action-btn ${state.articleCollected ? 'active' : ''}" id="articleCollectBtn">
      <span class="action-icon">${state.articleCollected ? '⭐' : '☆'}</span>
      ${state.articleCollected ? '已收藏' : '收藏'} ${formatCount(a.collect_count)}
    </button>`;
  $('#articleLikeBtn').addEventListener('click', () => toggleLike(1, a.id, 'article'));
  $('#articleCollectBtn').addEventListener('click', () => toggleCollect(1, a.id, 'article'));
}

$('#articleDetailBack').addEventListener('click', () => {
  $('#articleDetail').classList.remove('active');
  state.currentArticle = null;
});

$('#articleCommentSend').addEventListener('click', () => {
  const input = $('#articleCommentInput');
  const content = input.value.trim();
  if (!content || !state.currentArticle) return;
  postComment(1, state.currentArticle.id, content, input, '#articleComments');
});

/* ═══════════════════════════════════════════════════════════
   COURSE DETAIL
   ═══════════════════════════════════════════════════════════ */
async function openCourseDetail(id) {
  const overlay = $('#courseDetail');
  overlay.classList.add('active');
  const body = $('#courseDetailBody');
  body.innerHTML = loadingHtml();
  $('#courseDetailActions').innerHTML = '';

  try {
    const course = await apiGet('/courses/' + id);
    state.currentCourse = course;
    state.courseLiked = !!course.is_liked;
    state.courseCollected = !!course.is_collected;

    const units = course.units || [];
    const unitsHtml = units.length > 0
      ? `<div class="section-header"><span class="section-title">📋 课程单元</span></div>
         <div class="unit-list">${units.map((u, i) => `
           <div class="unit-item">
             <div class="unit-index">${i + 1}</div>
             <div class="unit-info">
               <div class="unit-title">${escapeHtml(u.title)}</div>
               <div class="unit-duration">${u.duration ? u.duration + '分钟' : ''}</div>
             </div>
           </div>`).join('')}</div>`
      : '';

    body.innerHTML = `
      ${course.cover_image
        ? `<img class="detail-cover" src="${escapeHtml(course.cover_image)}" alt="" onerror="this.outerHTML='<div class=\\'detail-cover-placeholder\\'>🎓</div>'">`
        : '<div class="detail-cover-placeholder">🎓</div>'}
      <div class="detail-content">
        <div class="detail-title">${escapeHtml(course.title)}</div>
        <div class="detail-info">
          <span>📖 ${formatCount(course.study_count)}人学习</span>
          <span>👁 ${formatCount(course.view_count)}</span>
          <span>${course.price > 0 ? '¥' + course.price : '免费'}</span>
        </div>
        <div class="detail-body">${escapeHtml(course.description || '暂无描述')}</div>
      </div>
      ${unitsHtml}
      <div class="comments-section">
        <div class="comments-title">💬 评论</div>
        <div id="courseComments">${loadingHtml()}</div>
      </div>`;
    renderCourseActions();
    loadComments(2, id, '#courseComments');
  } catch (e) {
    body.innerHTML = emptyHtml('加载失败: ' + e.message);
  }
}

function renderCourseActions() {
  const c = state.currentCourse;
  if (!c) return;
  $('#courseDetailActions').innerHTML = `
    <button class="action-btn ${state.courseLiked ? 'active' : ''}" id="courseLikeBtn">
      <span class="action-icon">${state.courseLiked ? '👍' : '👍'}</span>
      ${state.courseLiked ? '已赞' : '点赞'} ${formatCount(c.like_count)}
    </button>
    <button class="action-btn ${state.courseCollected ? 'active' : ''}" id="courseCollectBtn">
      <span class="action-icon">${state.courseCollected ? '⭐' : '☆'}</span>
      ${state.courseCollected ? '已收藏' : '收藏'} ${formatCount(c.collect_count)}
    </button>`;
  $('#courseLikeBtn').addEventListener('click', () => toggleLike(2, c.id, 'course'));
  $('#courseCollectBtn').addEventListener('click', () => toggleCollect(2, c.id, 'course'));
}

$('#courseDetailBack').addEventListener('click', () => {
  $('#courseDetail').classList.remove('active');
  state.currentCourse = null;
});

$('#courseCommentSend').addEventListener('click', () => {
  const input = $('#courseCommentInput');
  const content = input.value.trim();
  if (!content || !state.currentCourse) return;
  postComment(2, state.currentCourse.id, content, input, '#courseComments');
});

/* ═══════════════════════════════════════════════════════════
   LIKE / COLLECT / COMMENTS (shared)
   ═══════════════════════════════════════════════════════════ */
async function toggleLike(contentType, contentId, which) {
  const isLiked = which === 'article' ? state.articleLiked : state.courseLiked;
  try {
    if (isLiked) {
      await apiDelete('/likes/' + contentType + '/' + contentId);
    } else {
      await apiPost('/likes/' + contentType + '/' + contentId);
    }
    if (which === 'article') {
      state.articleLiked = !isLiked;
      state.currentArticle.like_count += isLiked ? -1 : 1;
      renderArticleActions();
    } else {
      state.courseLiked = !isLiked;
      state.currentCourse.like_count += isLiked ? -1 : 1;
      renderCourseActions();
    }
  } catch (e) { showToast(e.message); }
}

async function toggleCollect(contentType, contentId, which) {
  const isCollected = which === 'article' ? state.articleCollected : state.courseCollected;
  try {
    if (isCollected) {
      await apiDelete('/collections/' + contentType + '/' + contentId);
    } else {
      await apiPost('/collections/' + contentType + '/' + contentId);
    }
    if (which === 'article') {
      state.articleCollected = !isCollected;
      state.currentArticle.collect_count += isCollected ? -1 : 1;
      renderArticleActions();
    } else {
      state.courseCollected = !isCollected;
      state.currentCourse.collect_count += isCollected ? -1 : 1;
      renderCourseActions();
    }
  } catch (e) { showToast(e.message); }
}

async function loadComments(contentType, contentId, containerSel) {
  const container = document.querySelector(containerSel);
  if (!container) return;
  try {
    const data = await apiGet('/comments/' + contentType + '/' + contentId);
    const comments = data && data.list ? data.list : (Array.isArray(data) ? data : []);
    if (comments.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-hint);font-size:13px;">暂无评论，来抢沙发吧～</div>';
    } else {
      container.innerHTML = comments.map(c => commentHtml(c)).join('');
    }
  } catch (_) {
    container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-hint);font-size:13px;">评论加载失败</div>';
  }
}

function commentHtml(c) {
  const avatarContent = c.user && c.user.avatar_url
    ? `<img src="${escapeHtml(c.user.avatar_url)}" alt="">`
    : '💬';
  const replies = c.replies && c.replies.length > 0
    ? c.replies.map(r => commentHtml(r)).join('')
    : '';
  return `
    <div class="comment-item">
      <div class="comment-avatar">${avatarContent}</div>
      <div class="comment-body">
        <div class="comment-author">${escapeHtml(c.user ? c.user.nickname : '匿名用户')}</div>
        <div class="comment-text">${escapeHtml(c.content)}</div>
        <div class="comment-time">${formatTime(c.created_at)}</div>
        ${replies ? '<div style="margin-top:8px;padding-left:4px;">' + replies + '</div>' : ''}
      </div>
    </div>`;
}

async function postComment(contentType, contentId, content, inputEl, containerSel) {
  try {
    await apiPost('/comments/' + contentType + '/' + contentId, { content, parent_id: 0 });
    inputEl.value = '';
    showToast('评论成功');
    loadComments(contentType, contentId, containerSel);
  } catch (e) { showToast(e.message); }
}

/* ═══════════════════════════════════════════════════════════
   PROFILE PAGE
   ═══════════════════════════════════════════════════════════ */
async function loadProfile() {
  if (!state.token) return;
  try {
    const user = await apiGet('/users/profile');
    state.user = user;
    const avatarContent = user.avatar_url
      ? `<img src="${escapeHtml(user.avatar_url)}" alt="">`
      : '👤';
    $('#profileAvatar').innerHTML = avatarContent;
    $('#profileName').textContent = user.nickname || '用户';
    $('#profileId').textContent = 'ID: ' + user.id;
  } catch (_) { /* ignore, may not be logged in */ }

  // Load unread notifications count
  try {
    const data = await apiGet('/notifications?page_size=1');
    const notifications = data && data.list ? data.list : (Array.isArray(data) ? data : []);
    const unread = notifications.filter(n => n.is_read === 0).length;
    const pagination = data && data.pagination;
    // Use total as approximation if available
    state.unreadCount = pagination ? Math.min(pagination.total, MAX_BADGE_COUNT) : unread;
    updateNotifBadge();
  } catch (_) { /* ignore */ }
}

function updateNotifBadge() {
  const count = state.unreadCount;
  const badge = $('#notifBadge');
  const tabBadge = $('#tabNotifBadge');
  if (count > 0) {
    badge.textContent = count > MAX_BADGE_COUNT ? MAX_BADGE_COUNT + '+' : count;
    badge.style.display = 'flex';
    tabBadge.textContent = count > MAX_BADGE_COUNT ? MAX_BADGE_COUNT + '+' : count;
    tabBadge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
    tabBadge.style.display = 'none';
  }
}

/* ── Collections ──────────────────────────────────────── */
$('#menuCollections').addEventListener('click', async () => {
  const overlay = $('#collectionsOverlay');
  overlay.classList.add('active');
  const body = $('#collectionsBody');
  body.innerHTML = loadingHtml();
  try {
    const data = await apiGet('/collections');
    const list = data && data.list ? data.list : (Array.isArray(data) ? data : []);
    if (list.length === 0) {
      body.innerHTML = emptyHtml('暂无收藏');
    } else {
      body.innerHTML = list.map(c => {
        const typeLabel = c.content_type === 1 ? '📝 文章' : '🎓 课程';
        const img = c.cover_image
          ? `<img class="card-img" src="${escapeHtml(c.cover_image)}" alt="" onerror="this.outerHTML='<div class=\\'card-img-placeholder\\'>${c.content_type === 1 ? '📝' : '🎓'}</div>'">`
          : `<div class="card-img-placeholder">${c.content_type === 1 ? '📝' : '🎓'}</div>`;
        return `
          <div class="card card-horizontal" data-type="${c.content_type}" data-id="${c.content_id}">
            ${img}
            <div class="card-body">
              <div class="card-title">${escapeHtml(c.content_title || '无标题')}</div>
              <div class="card-meta"><span>${typeLabel}</span><span>${formatTime(c.created_at)}</span></div>
            </div>
          </div>`;
      }).join('');
      body.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => {
          const type = parseInt(card.dataset.type);
          const id = parseInt(card.dataset.id);
          overlay.classList.remove('active');
          if (type === 1) openArticleDetail(id);
          else openCourseDetail(id);
        });
      });
    }
  } catch (e) {
    body.innerHTML = emptyHtml('加载失败: ' + e.message);
  }
});

$('#collectionsBack').addEventListener('click', () => $('#collectionsOverlay').classList.remove('active'));

/* ── Study Records ────────────────────────────────────── */
$('#menuStudy').addEventListener('click', async () => {
  const overlay = $('#studyOverlay');
  overlay.classList.add('active');
  const body = $('#studyBody');
  body.innerHTML = loadingHtml();
  try {
    const data = await apiGet('/study-records');
    const list = data && data.list ? data.list : (Array.isArray(data) ? data : []);
    if (list.length === 0) {
      body.innerHTML = emptyHtml('暂无学习记录');
    } else {
      body.innerHTML = list.map(r => {
        const statusLabel = r.status === 2 ? '✅ 已完成' : (r.status === 1 ? '📖 学习中' : '⏳ 未开始');
        const progress = r.progress ? Math.floor(r.progress / 60) + '分钟' : '0分钟';
        return `
          <div class="card" data-id="${r.course_id}">
            <div class="card-title">课程 #${r.course_id}</div>
            <div class="card-meta">
              <span>${statusLabel}</span>
              <span>已学 ${progress}</span>
              <span>${formatTime(r.last_study_at || r.updated_at)}</span>
            </div>
          </div>`;
      }).join('');
      body.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => {
          overlay.classList.remove('active');
          openCourseDetail(parseInt(card.dataset.id));
        });
      });
    }
  } catch (e) {
    body.innerHTML = emptyHtml('加载失败: ' + e.message);
  }
});

$('#studyBack').addEventListener('click', () => $('#studyOverlay').classList.remove('active'));

/* ── Notifications ────────────────────────────────────── */
$('#menuNotifications').addEventListener('click', async () => {
  const overlay = $('#notificationsOverlay');
  overlay.classList.add('active');
  const body = $('#notificationsBody');
  body.innerHTML = loadingHtml();
  try {
    const data = await apiGet('/notifications');
    const list = data && data.list ? data.list : (Array.isArray(data) ? data : []);
    if (list.length === 0) {
      body.innerHTML = emptyHtml('暂无消息');
    } else {
      body.innerHTML = list.map(n => {
        const typeIcon = n.type === 1 ? '📢' : (n.type === 2 ? '💬' : '⏰');
        const unread = n.is_read === 0;
        return `
          <div class="card" data-id="${n.id}" style="${unread ? 'border-left: 3px solid var(--primary);' : 'opacity:0.7;'}">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
              <span style="font-size:16px;">${typeIcon}</span>
              <span class="card-title" style="margin-bottom:0;">${escapeHtml(n.title)}</span>
            </div>
            <div class="card-desc">${escapeHtml(n.content)}</div>
            <div class="card-meta"><span>${formatTime(n.created_at)}</span>${unread ? '<span style="color:var(--primary);">● 未读</span>' : ''}</div>
          </div>`;
      }).join('');
      // Mark individual as read on click
      body.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', async () => {
          const id = card.dataset.id;
          try {
            await apiPut('/notifications/' + id + '/read');
            card.style.borderLeft = 'none';
            card.style.opacity = '0.7';
          } catch (_) {}
        });
      });
    }
  } catch (e) {
    body.innerHTML = emptyHtml('加载失败: ' + e.message);
  }
});

$('#notificationsBack').addEventListener('click', () => $('#notificationsOverlay').classList.remove('active'));

$('#readAllBtn').addEventListener('click', async () => {
  try {
    await apiPut('/notifications/read-all');
    state.unreadCount = 0;
    updateNotifBadge();
    showToast('已全部标为已读');
    // Refresh the list
    $('#menuNotifications').click();
  } catch (e) { showToast(e.message); }
});

/* ═══════════════════════════════════════════════════════════
   APP INIT
   ═══════════════════════════════════════════════════════════ */
async function initApp() {
  scheduleTokenRefresh();
  // Load modules first (needed for article filters)
  try {
    const modulesData = await apiGet('/modules');
    state.modules = modulesData && modulesData.list ? modulesData.list : (Array.isArray(modulesData) ? modulesData : []);
  } catch (_) {}
  loadHome();
}

// Boot
(function boot() {
  if (state.token) {
    hideLogin();
    initApp();
  } else {
    showLogin();
  }
})();
</script>
