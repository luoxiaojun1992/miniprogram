<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识库管理后台</title>
<script src="../lib/vue.global.prod.js"></script>
<style>
:root {
  --sidebar-bg: #1e1e2d;
  --sidebar-hover: #2a2a3d;
  --sidebar-active: #4361ee22;
  --sidebar-text: #9899ac;
  --sidebar-text-active: #ffffff;
  --sidebar-width: 260px;
  --sidebar-collapsed-width: 64px;
  --header-height: 60px;
  --content-bg: #f5f5f9;
  --card-bg: #ffffff;
  --primary: #4361ee;
  --primary-hover: #3451de;
  --primary-light: #4361ee15;
  --success: #2bc48a;
  --success-light: #2bc48a18;
  --danger: #f64e60;
  --danger-light: #f64e6018;
  --warning: #ffa800;
  --warning-light: #ffa80018;
  --info: #8950fc;
  --text-primary: #181c32;
  --text-secondary: #7e8299;
  --text-muted: #b5b5c3;
  --border-color: #ebedf3;
  --radius: 8px;
  --radius-sm: 4px;
  --shadow: 0 0 20px 0 rgba(76,87,125,.02);
  --shadow-sm: 0 .5rem 1.5rem .5rem rgba(0,0,0,.05);
  --transition: all .2s ease;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--content-bg); color: var(--text-primary); line-height: 1.6; }
a { text-decoration: none; color: inherit; }
button { cursor: pointer; border: none; font-family: inherit; font-size: inherit; }
input, select, textarea { font-family: inherit; font-size: 14px; }
table { border-collapse: collapse; width: 100%; }

.login-wrapper { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #1e1e2d 0%, #2d2d44 100%); }
.login-card { background: var(--card-bg); border-radius: 12px; padding: 48px 40px; width: 420px; max-width: 90vw; box-shadow: var(--shadow-sm); }
.login-card h1 { text-align: center; margin-bottom: 8px; font-size: 24px; color: var(--text-primary); }
.login-card .subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 32px; font-size: 14px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: var(--text-secondary); }
.form-control { width: 100%; padding: 10px 14px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-size: 14px; transition: var(--transition); outline: none; background: #fff; }
.form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
.form-control.error { border-color: var(--danger); }
.error-text { color: var(--danger); font-size: 12px; margin-top: 4px; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 20px; border-radius: var(--radius-sm); font-weight: 600; font-size: 14px; transition: var(--transition); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { opacity: .9; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { opacity: .9; }
.btn-warning { background: var(--warning); color: #fff; }
.btn-warning:hover { opacity: .9; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-block { width: 100%; }
.btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn:disabled { opacity: .5; cursor: not-allowed; }

.admin-layout { display: flex; min-height: 100vh; }
.sidebar { width: var(--sidebar-width); background: var(--sidebar-bg); color: var(--sidebar-text); position: fixed; top: 0; left: 0; bottom: 0; display: flex; flex-direction: column; z-index: 100; transition: width .3s ease; overflow: hidden; }
.sidebar.collapsed { width: var(--sidebar-collapsed-width); }
.sidebar-brand { height: var(--header-height); display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid rgba(255,255,255,.07); flex-shrink: 0; }
.sidebar-brand h2 { font-size: 18px; color: #fff; white-space: nowrap; overflow: hidden; }
.sidebar.collapsed .sidebar-brand h2 { display: none; }
.sidebar-brand .toggle-btn { margin-left: auto; background: none; color: var(--sidebar-text); font-size: 18px; padding: 4px; border-radius: 4px; flex-shrink: 0; }
.sidebar-brand .toggle-btn:hover { color: #fff; background: var(--sidebar-hover); }
.sidebar-menu { flex: 1; overflow-y: auto; padding: 12px 0; }
.sidebar-menu::-webkit-scrollbar { width: 4px; }
.sidebar-menu::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }
.menu-section { margin-bottom: 4px; }
.menu-item { display: flex; align-items: center; padding: 10px 20px; cursor: pointer; transition: var(--transition); white-space: nowrap; font-size: 14px; border-left: 3px solid transparent; }
.menu-item:hover { background: var(--sidebar-hover); color: var(--sidebar-text-active); }
.menu-item.active { background: var(--sidebar-active); color: var(--sidebar-text-active); border-left-color: var(--primary); }
.menu-item .icon { width: 24px; text-align: center; margin-right: 12px; font-size: 16px; flex-shrink: 0; }
.sidebar.collapsed .menu-item .label { display: none; }
.sidebar.collapsed .menu-item .arrow { display: none; }
.menu-item .arrow { margin-left: auto; font-size: 12px; transition: transform .2s; }
.menu-item .arrow.open { transform: rotate(90deg); }
.submenu { overflow: hidden; max-height: 0; transition: max-height .3s ease; }
.submenu.open { max-height: 500px; }
.submenu .menu-item { padding-left: 56px; font-size: 13px; }
.sidebar-footer { padding: 12px 20px; border-top: 1px solid rgba(255,255,255,.07); font-size: 12px; color: var(--sidebar-text); flex-shrink: 0; }
.sidebar-footer .user-info { display: flex; align-items: center; gap: 8px; }
.sidebar-footer .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; flex-shrink: 0; }
.sidebar.collapsed .sidebar-footer .user-details { display: none; }
.sidebar-footer .logout-btn { margin-top: 8px; width: 100%; padding: 6px; background: rgba(255,255,255,.05); color: var(--sidebar-text); border-radius: var(--radius-sm); font-size: 12px; text-align: center; }
.sidebar-footer .logout-btn:hover { background: rgba(246,78,96,.2); color: var(--danger); }
.sidebar.collapsed .sidebar-footer .logout-btn span { display: none; }

.main-content { flex: 1; margin-left: var(--sidebar-width); transition: margin-left .3s ease; }
.main-content.sidebar-collapsed { margin-left: var(--sidebar-collapsed-width); }
.content-header { height: var(--header-height); background: var(--card-bg); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 24px; position: sticky; top: 0; z-index: 50; }
.content-header h3 { font-size: 18px; color: var(--text-primary); }
.content-body { padding: 24px; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-bottom: 24px; }
.stat-card { background: var(--card-bg); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 16px; }
.stat-card .stat-icon { width: 52px; height: 52px; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.stat-card .stat-icon.blue { background: var(--primary-light); }
.stat-card .stat-icon.green { background: var(--success-light); }
.stat-card .stat-icon.orange { background: var(--warning-light); }
.stat-card .stat-icon.purple { background: #8950fc18; }
.stat-card .stat-info h4 { font-size: 24px; font-weight: 700; color: var(--text-primary); }
.stat-card .stat-info p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

.table-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.table-toolbar { padding: 16px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; border-bottom: 1px solid var(--border-color); }
.table-toolbar .search-input { padding: 8px 14px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); width: 260px; outline: none; font-size: 14px; }
.table-toolbar .search-input:focus { border-color: var(--primary); }
.table-toolbar .filter-select { padding: 8px 12px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); outline: none; font-size: 14px; background: #fff; }
.data-table { width: 100%; }
.data-table th { background: #f9fafb; padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border-color); white-space: nowrap; }
.data-table td { padding: 12px 16px; border-bottom: 1px solid var(--border-color); font-size: 14px; color: var(--text-primary); }
.data-table tr:hover td { background: #f9fafb; }
.data-table .actions { display: flex; gap: 6px; }

.badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge-success { background: var(--success-light); color: var(--success); }
.badge-danger { background: var(--danger-light); color: var(--danger); }
.badge-warning { background: var(--warning-light); color: var(--warning); }
.badge-info { background: #8950fc18; color: var(--info); }
.badge-primary { background: var(--primary-light); color: var(--primary); }
.badge-secondary { background: #e4e6ef; color: var(--text-secondary); }

.pagination-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-top: 1px solid var(--border-color); font-size: 13px; color: var(--text-secondary); }
.pagination-bar .pages { display: flex; gap: 4px; }
.pagination-bar .page-btn { min-width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: #fff; color: var(--text-secondary); cursor: pointer; transition: var(--transition); font-size: 13px; }
.pagination-bar .page-btn:hover { border-color: var(--primary); color: var(--primary); }
.pagination-bar .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.pagination-bar .page-btn:disabled { opacity: .4; cursor: not-allowed; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal-box { background: var(--card-bg); border-radius: var(--radius); width: 560px; max-width: 90vw; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
.modal-box.wide { width: 720px; }
.modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.modal-header h3 { font-size: 18px; }
.modal-close { background: none; font-size: 22px; color: var(--text-muted); padding: 4px; }
.modal-close:hover { color: var(--text-primary); }
.modal-body { padding: 24px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.form-row .form-group { margin-bottom: 0; }
.form-group textarea { min-height: 80px; resize: vertical; }
.form-group textarea.large { min-height: 160px; }

.toast-container { position: fixed; top: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 14px 20px; border-radius: var(--radius-sm); color: #fff; font-size: 14px; box-shadow: var(--shadow-sm); min-width: 260px; max-width: 400px; animation: slideIn .3s ease; }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
.toast.info { background: var(--primary); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.confirm-body { text-align: center; padding: 20px 0; }
.confirm-body .confirm-icon { font-size: 48px; margin-bottom: 12px; }
.confirm-body p { color: var(--text-secondary); font-size: 15px; }

.tree-node { padding: 6px 0 6px 20px; border-left: 1px dashed var(--border-color); }
.tree-node .node-row { display: flex; align-items: center; gap: 8px; padding: 4px 8px; border-radius: var(--radius-sm); font-size: 14px; }
.tree-node .node-row:hover { background: #f4f4f8; }
.tree-root > .tree-node { border-left: none; padding-left: 0; }

.checkbox-group { display: flex; flex-wrap: wrap; gap: 12px; }
.checkbox-group label { display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer; }
.checkbox-group input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); }

.loading-spinner { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }

.fade-enter-active, .fade-leave-active { transition: opacity .2s ease; }
.fade-enter-from, .fade-leave-to { opacity: 0; }
.slide-enter-active, .slide-leave-active { transition: all .3s ease; }
.slide-enter-from { opacity: 0; transform: scale(.95); }
.slide-leave-to { opacity: 0; transform: scale(.95); }

@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.mobile-open { transform: translateX(0); }
  .main-content { margin-left: 0 !important; }
  .form-row { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .table-toolbar { flex-direction: column; align-items: stretch; }
  .table-toolbar .search-input { width: 100%; }
}
</style>
</head>
<body>
<div id="app"><admin-app></admin-app></div>

<script type="text/x-template" id="tmpl-toast">
<teleport to="body">
  <div class="toast-container">
    <transition-group name="fade">
      <div v-for="t in store.toasts" :key="t.id" :class="['toast', t.type]">{{ t.message }}</div>
    </transition-group>
  </div>
</teleport>
</script>
<script type="text/x-template" id="tmpl-confirm">
<teleport to="body">
  <transition name="fade">
    <div v-if="store.confirm.show" class="modal-overlay" @click.self="cancel">
      <transition name="slide">
        <div class="modal-box" style="width:400px">
          <div class="modal-header">
            <h3>确认操作</h3>
            <button class="modal-close" @click="cancel">✕</button>
          </div>
          <div class="modal-body confirm-body">
            <div class="confirm-icon">⚠️</div>
            <p>{{ store.confirm.message }}</p>
          </div>
          <div class="modal-footer">
            <button class="btn btn-outline" @click="cancel">取消</button>
            <button class="btn btn-danger" @click="ok">确认</button>
          </div>
        </div>
      </transition>
    </div>
  </transition>
</teleport>
</script>
<script type="text/x-template" id="tmpl-modal">
<teleport to="body">
  <transition name="fade">
    <div v-if="visible" class="modal-overlay" @click.self="$emit('close')">
      <transition name="slide">
        <div :class="['modal-box', {wide: wide}]">
          <div class="modal-header">
            <h3>{{ title }}</h3>
            <button class="modal-close" @click="$emit('close')">✕</button>
          </div>
          <div class="modal-body"><slot></slot></div>
          <div class="modal-footer"><slot name="footer"></slot></div>
        </div>
      </transition>
    </div>
  </transition>
</teleport>
</script>
<script type="text/x-template" id="tmpl-pagination">
<div v-if="total > 0" class="pagination-bar">
  <span>共 {{ total }} 条，第 {{ page }} / {{ totalPages }} 页</span>
  <div class="pages">
    <button class="page-btn" :disabled="page <= 1" @click="$emit('change', page - 1)">‹</button>
    <button v-for="p in visiblePages" :key="p" :class="['page-btn', {active: p === page}]" @click="$emit('change', p)">{{ p }}</button>
    <button class="page-btn" :disabled="page >= totalPages" @click="$emit('change', page + 1)">›</button>
  </div>
</div>
</script>
<script type="text/x-template" id="tmpl-data-table">
<div class="table-card">
  <div class="table-toolbar"><slot name="toolbar"></slot></div>
  <div style="overflow-x:auto">
    <table class="data-table">
      <thead><tr><th v-for="c in columns" :key="c.key">{{ c.label }}</th></tr></thead>
      <tbody>
        <tr v-if="loading"><td :colspan="columns.length"><div class="loading-spinner">加载中...</div></td></tr>
        <tr v-else-if="!rows.length"><td :colspan="columns.length"><div class="empty-state"><div class="empty-icon">📭</div><p>暂无数据</p></div></td></tr>
        <template v-else>
          <tr v-for="(row, idx) in rows" :key="row.id || idx">
            <td v-for="c in columns" :key="c.key"><slot :name="'col-' + c.key" :row="row" :value="row[c.key]">{{ row[c.key] }}</slot></td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>
  <pagination-bar :total="total" :page="page" :page-size="pageSize" @change="$emit('page-change', $event)"></pagination-bar>
</div>
</script>
<script type="text/x-template" id="tmpl-login">
<div class="login-wrapper">
  <div class="login-card">
    <h1>📚 知识库管理后台</h1>
    <p class="subtitle">管理员登录</p>
    <div class="form-group">
      <label>API 地址</label>
      <input class="form-control" v-model="apiUrl" placeholder="http://localhost:8080/v1">
    </div>
    <div class="form-group">
      <label>邮箱</label>
      <input :class="['form-control', {error: errors.email}]" v-model="email" type="email" placeholder="admin@example.com" @keyup.enter="login">
      <div v-if="errors.email" class="error-text">{{ errors.email }}</div>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input :class="['form-control', {error: errors.password}]" v-model="password" type="password" placeholder="请输入密码" @keyup.enter="login">
      <div v-if="errors.password" class="error-text">{{ errors.password }}</div>
    </div>
    <div v-if="errors.general" class="error-text" style="margin-bottom:12px">{{ errors.general }}</div>
    <button class="btn btn-primary btn-block" :disabled="loading" @click="login">{{ loading ? '登录中...' : '登 录' }}</button>
  </div>
</div>
</script>
<script type="text/x-template" id="tmpl-sidebar">
<aside :class="['sidebar', {collapsed: store.sidebarCollapsed}]">
  <div class="sidebar-brand">
    <h2>📚 知识库</h2>
    <button class="toggle-btn" @click="store.sidebarCollapsed = !store.sidebarCollapsed">{{ store.sidebarCollapsed ? '▶' : '◀' }}</button>
  </div>
  <nav class="sidebar-menu">
    <div v-for="sec in sections" :key="sec.label" class="menu-section">
      <div v-if="!sec.children" :class="['menu-item', {active: store.currentPage === sec.page}]" @click="navigate(sec.page)">
        <span class="icon">{{ sec.icon }}</span><span class="label">{{ sec.label }}</span>
      </div>
      <template v-else>
        <div class="menu-item" @click="toggle(sec.label)">
          <span class="icon">{{ sec.icon }}</span><span class="label">{{ sec.label }}</span>
          <span :class="['arrow', {open: expanded[sec.label]}]">▶</span>
        </div>
        <div :class="['submenu', {open: expanded[sec.label]}]">
          <div v-for="ch in sec.children" :key="ch.page" :class="['menu-item', {active: store.currentPage === ch.page}]" @click="navigate(ch.page)">
            <span class="icon">{{ ch.icon }}</span><span class="label">{{ ch.label }}</span>
          </div>
        </div>
      </template>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="avatar">管</div>
      <div class="user-details"><div style="color:#fff;font-weight:600">管理员</div></div>
    </div>
    <button class="logout-btn" @click="$emit('logout')">🚪 <span>退出登录</span></button>
  </div>
</aside>
</script>
<script type="text/x-template" id="tmpl-dashboard">
<div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-icon blue">👥</div><div class="stat-info"><h4>{{ stats.users }}</h4><p>用户总数</p></div></div>
    <div class="stat-card"><div class="stat-icon green">📄</div><div class="stat-info"><h4>{{ stats.articles }}</h4><p>文章总数</p></div></div>
    <div class="stat-card"><div class="stat-icon orange">📚</div><div class="stat-info"><h4>{{ stats.courses }}</h4><p>课程总数</p></div></div>
    <div class="stat-card"><div class="stat-icon purple">💬</div><div class="stat-info"><h4>{{ stats.comments }}</h4><p>评论总数</p></div></div>
  </div>
</div>
</script>
<script>

var { createApp, ref, reactive, computed, watch, onMounted, nextTick } = Vue;

var store = reactive({
  token: localStorage.getItem('admin_token') || '',
  apiBase: localStorage.getItem('admin_api_base') || 'http://localhost:8080/v1',
  currentPage: 'dashboard',
  sidebarCollapsed: false,
  toasts: [],
  confirm: { show: false, message: '', resolve: null }
});

var toastId = 0;
function showToast(message, type) {
  type = type || 'success';
  var id = ++toastId;
  store.toasts.push({ id: id, message: message, type: type });
  setTimeout(function() { store.toasts = store.toasts.filter(function(t) { return t.id !== id; }); }, 3000);
}

function showConfirm(message) {
  return new Promise(function(resolve) {
    store.confirm = { show: true, message: message, resolve: resolve };
  });
}

async function api(method, path, body, qs) {
  var url = store.apiBase + path;
  if (qs) {
    var params = new URLSearchParams();
    Object.entries(qs).forEach(function(e) { if (e[1] !== '' && e[1] != null) params.append(e[0], e[1]); });
    var s = params.toString();
    if (s) url += '?' + s;
  }
  var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
  if (store.token) opts.headers['Authorization'] = 'Bearer ' + store.token;
  if (body && method !== 'GET') opts.body = JSON.stringify(body);
  var res = await fetch(url, opts);
  if (res.status === 401) {
    store.token = '';
    localStorage.removeItem('admin_token');
    throw new Error('登录已过期，请重新登录');
  }
  var json = await res.json();
  if (json.code !== 0) throw new Error(json.message || '请求失败');
  return json.data;
}

function fmtDate(v) {
  if (!v) return '-';
  try { return new Date(v).toLocaleString('zh-CN'); } catch(e) { return v; }
}

  template: '#tmpl-pagination',
  props: { total: { type: Number, default: 0 }, page: { type: Number, default: 1 }, pageSize: { type: Number, default: 20 } },
  emits: ['change'],
  setup: function(props) {
    var totalPages = computed(function() { return Math.max(1, Math.ceil(props.total / props.pageSize)); });
    var visiblePages = computed(function() {
      var tp = totalPages.value, p = props.page, pages = [];
      var start = Math.max(1, p - 2), end = Math.min(tp, p + 2);
      if (end - start < 4) { start = Math.max(1, end - 4); end = Math.min(tp, start + 4); }
      for (var i = start; i <= end; i++) pages.push(i);
      return pages;
    });
    return { totalPages: totalPages, visiblePages: visiblePages };
  }
});

app.component('comment-management', {
  template: '<div>' +
    '<data-table :columns="columns" :rows="list" :loading="loading" :total="total" :page="page" :page-size="pageSize" @page-change="page=$event; load()">' +
      '<template #toolbar>' +
        '<select class="filter-select" v-model="statusFilter" @change="page=1; load()">' +
          '<option value="">全部状态</option><option value="0">待审核</option><option value="1">已通过</option><option value="2">已拒绝</option>' +
        '</select>' +
      '</template>' +
      '<template #col-content="{value}">{{ (value||"").length > 50 ? (value||"").substring(0,50) + "..." : value }}</template>' +
      '<template #col-status="{value}">' +
        '<span :class="[\'badge\', value===1?\'badge-success\':value===2?\'badge-danger\':\'badge-warning\']">{{ {0:\'待审核\',1:\'已通过\',2:\'已拒绝\'}[value]||value }}</span>' +
      '</template>' +
      '<template #col-created_at="{value}">{{ fmtDate(value) }}</template>' +
      '<template #col-actions="{row}">' +
        '<div class="actions">' +
          '<button v-if="row.status!==1" class="btn btn-success btn-sm" @click="audit(row, 1)">通过</button>' +
          '<button v-if="row.status!==2" class="btn btn-warning btn-sm" @click="audit(row, 2)">拒绝</button>' +
          '<button class="btn btn-danger btn-sm" @click="remove(row)">删除</button>' +
        '</div>' +
      '</template>' +
    '</data-table>' +
  '</div>',
  setup: function() {
    var columns = [
      { key: 'id', label: 'ID' }, { key: 'user_id', label: '用户' }, { key: 'content_type', label: '内容类型' },
      { key: 'content', label: '内容' }, { key: 'status', label: '状态' },
      { key: 'created_at', label: '创建时间' }, { key: 'actions', label: '操作' }
    ];
    var list = ref([]); var loading = ref(false); var total = ref(0); var page = ref(1); var pageSize = 20; var statusFilter = ref('');

    async function load() {
      loading.value = true;
      try {
        var qs = { page: page.value, page_size: pageSize };
        if (statusFilter.value !== '') qs.status = statusFilter.value;
        var d = await api('GET', '/admin/comments', null, qs); list.value = d.list || []; total.value = d.pagination ? d.pagination.total : 0;
      } catch(e) { showToast(e.message, 'error'); } finally { loading.value = false; }
    }
    async function audit(row, status) {
      try { await api('PUT', '/admin/comments/' + row.id + '/audit', { status: status }); showToast('操作成功'); load(); } catch(e) { showToast(e.message, 'error'); }
    }
    async function remove(row) {
      if (!(await showConfirm('确定要删除此评论吗？'))) return;
      try { await api('DELETE', '/admin/comments/' + row.id); showToast('删除成功'); load(); } catch(e) { showToast(e.message, 'error'); }
    }
    onMounted(load);
    return { columns: columns, list: list, loading: loading, total: total, page: page, pageSize: pageSize, statusFilter: statusFilter,
      load: load, audit: audit, remove: remove, fmtDate: fmtDate };
  }
});

app.component('role-management', {
  template: '<div>' +
    '<data-table :columns="columns" :rows="list" :loading="loading" :total="total" :page="page" :page-size="pageSize" @page-change="page=$event; load()">' +
      '<template #toolbar>' +
        '<button class="btn btn-primary btn-sm" style="margin-left:auto" @click="openCreate()">+ 新增角色</button>' +
      '</template>' +
      '<template #col-is_builtin="{value}"><span :class="[\'badge\', value?\'badge-info\':\'badge-secondary\']">{{ value?\'是\':\'否\' }}</span></template>' +
      '<template #col-actions="{row}">' +
        '<div class="actions">' +
          '<button class="btn btn-primary btn-sm" @click="openEdit(row)">编辑</button>' +
          '<button class="btn btn-danger btn-sm" :disabled="row.is_builtin" @click="remove(row)">删除</button>' +
        '</div>' +
      '</template>' +
    '</data-table>' +
    '<modal-dialog :visible="showModal" :title="editId?\'编辑角色\':\'新增角色\'" :wide="true" @close="showModal=false">' +
      '<div class="form-group"><label>名称</label><input class="form-control" v-model="form.name"></div>' +
      '<div class="form-group"><label>描述</label><textarea class="form-control" v-model="form.description"></textarea></div>' +
      '<div class="form-group"><label>父角色</label>' +
        '<select class="form-control" v-model.number="form.parent_id"><option :value="0">无</option><option v-for="r in list" :key="r.id" :value="r.id">{{ r.name }}</option></select>' +
      '</div>' +
      '<div class="form-group"><label>权限</label>' +
        '<div v-if="permsLoading" class="loading-spinner">加载中...</div>' +
        '<div v-else class="checkbox-group">' +
          '<label v-for="p in allPerms" :key="p.id"><input type="checkbox" :value="p.id" v-model="form.permission_ids">{{ p.name }} ({{ p.code }})</label>' +
        '</div>' +
      '</div>' +
      '<template #footer>' +
        '<button class="btn btn-outline" @click="showModal=false">取消</button>' +
        '<button class="btn btn-primary" :disabled="saving" @click="save()">{{ saving?\'保存中...\':\'保存\' }}</button>' +
      '</template>' +
    '</modal-dialog>' +
  '</div>',
  setup: function() {
    var columns = [{ key: 'id', label: 'ID' }, { key: 'name', label: '名称' }, { key: 'description', label: '描述' }, { key: 'level', label: '等级' }, { key: 'is_builtin', label: '内置' }, { key: 'actions', label: '操作' }];
    var list = ref([]); var loading = ref(false); var total = ref(0); var page = ref(1); var pageSize = 20;
    var showModal = ref(false); var editId = ref(null); var saving = ref(false);
    var allPerms = ref([]); var permsLoading = ref(false);
    var form = reactive({ name: '', description: '', parent_id: 0, permission_ids: [] });

    function flattenPerms(nodes, result) {
      result = result || [];
      nodes.forEach(function(n) { result.push(n); if (n.children && n.children.length) flattenPerms(n.children, result); });
      return result;
    }
    async function load() {
      loading.value = true;
      try { var d = await api('GET', '/admin/roles', null, { page: page.value, page_size: pageSize }); list.value = d.list || d || []; total.value = d.pagination ? d.pagination.total : list.value.length; }
      catch(e) { showToast(e.message, 'error'); } finally { loading.value = false; }
    }
    async function loadPerms() {
      permsLoading.value = true;
      try { var d = await api('GET', '/admin/permissions'); allPerms.value = flattenPerms(d.list || d || []); } catch(e) {} finally { permsLoading.value = false; }
    }
    function openCreate() { editId.value = null; Object.assign(form, { name: '', description: '', parent_id: 0, permission_ids: [] }); showModal.value = true; loadPerms(); }
    async function openEdit(row) {
      editId.value = row.id; Object.assign(form, { name: row.name||'', description: row.description||'', parent_id: row.parent_id||0, permission_ids: [] }); showModal.value = true; loadPerms();
      try { var d = await api('GET', '/admin/roles/' + row.id); if (d.permissions) form.permission_ids = d.permissions.map(function(p) { return p.id || p; }); } catch(e) {}
    }
    async function save() {
      if (!form.name) { showToast('请输入名称', 'error'); return; }
      saving.value = true;
      try {
        if (editId.value) await api('PUT', '/admin/roles/' + editId.value, Object.assign({}, form));
        else await api('POST', '/admin/roles', Object.assign({}, form));
        showToast('保存成功'); showModal.value = false; load();
      } catch(e) { showToast(e.message, 'error'); } finally { saving.value = false; }
    }
    async function remove(row) {
      if (!(await showConfirm('确定要删除角色 "' + row.name + '" 吗？'))) return;
      try { await api('DELETE', '/admin/roles/' + row.id); showToast('删除成功'); load(); } catch(e) { showToast(e.message, 'error'); }
    }
    onMounted(load);
    return { columns: columns, list: list, loading: loading, total: total, page: page, pageSize: pageSize,
      showModal: showModal, editId: editId, form: form, saving: saving, allPerms: allPerms, permsLoading: permsLoading,
      load: load, openCreate: openCreate, openEdit: openEdit, save: save, remove: remove };
  }
});

app.component('log-config', {
