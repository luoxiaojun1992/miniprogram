run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/luoxiaojun1992/miniprogram
  govet:
    check-shadowing: false
  staticcheck:
    checks: ["all"]
  errcheck:
    check-type-assertions: false
    check-blank: false
  gocyclo:
    min-complexity: 15
  misspell:
    locale: US

linters:
  enable:
    - gofmt
    - goimports
    - govet
    - staticcheck
    - errcheck
    - gosimple
    - ineffassign
    - typecheck
    - misspell
  disable:
    - deadcode
    - structcheck

issues:
  exclude-use-default: false
  max-issues-per-linter: 50
  max-same-issues: 3
