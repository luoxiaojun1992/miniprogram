swagger: "2.0"
info:
  title: 知识库后端系统 API
  description: |
    知识库后端系统 RESTful API 文档
    
    **功能模块：**
    - 用户认证与授权（微信登录、JWT）
    - 用户与权限管理（RBAC）
    - 内容管理（模块、文章、课程）
    - 互动功能（收藏、点赞、评论、学习记录）
    - 消息通知
    - 系统管理（日志、配置）
    
    **认证方式：**
    - 前台用户：微信登录获取 JWT Token
    - 管理员：账号密码登录获取 JWT Token
    - 所有受保护接口需在 Header 中携带 `Authorization: Bearer {token}`
  version: "1.0.0"
  contact:
    name: API Support
    
host: api.example.com
basePath: /v1
schemes:
  - https
  - http

# 全局安全定义
securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header
    description: "JWT Token，格式：Bearer {token}"
    
  # 接口权限要求（通过 x-permission 扩展字段指定）
  # 例如：x-permission: "article:create"

# 全局参数定义
parameters:
  # 分页参数
  PageParam:
    name: page
    in: query
    type: integer
    default: 1
    minimum: 1
    description: 页码
    
  PageSizeParam:
    name: page_size
    in: query
    type: integer
    default: 20
    minimum: 1
    maximum: 100
    description: 每页数量
    
  # 排序参数
  SortParam:
    name: sort
    in: query
    type: string
    description: 排序字段，例如：-created_at 表示按创建时间倒序
    
  # 搜索参数
  KeywordParam:
    name: keyword
    in: query
    type: string
    description: 搜索关键词
    
  # ID 参数
  IdPathParam:
    name: id
    in: path
    required: true
    type: integer
    format: int64
    description: 资源ID
    
  # 内容类型参数（用于收藏、点赞、评论等）
  ContentTypeParam:
    name: content_type
    in: path
    required: true
    type: integer
    enum: [1, 2]
    description: "内容类型：1-文章，2-课程"
    
  ContentIdParam:
    name: content_id
    in: path
    required: true
    type: integer
    format: int64
    description: 内容ID

# 全局响应定义
responses:
  # 标准成功响应（无数据）
  Success:
    description: 操作成功
    schema:
      $ref: "#/definitions/ApiResponse"
      
  # 创建成功
  Created:
    description: 创建成功
    schema:
      $ref: "#/definitions/ApiResponse"
    headers:
      Location:
        type: string
        description: 新创建资源的URL
        
  # 无内容（删除成功）
  NoContent:
    description: 删除成功，无返回内容
    
  # 错误响应
  BadRequest:
    description: 请求参数错误
    schema:
      $ref: "#/definitions/ErrorResponse"
      
  Unauthorized:
    description: 未授权，Token无效或过期
    schema:
      $ref: "#/definitions/ErrorResponse"
      
  Forbidden:
    description: 禁止访问，权限不足
    schema:
      $ref: "#/definitions/ErrorResponse"
      
  NotFound:
    description: 资源不存在
    schema:
      $ref: "#/definitions/ErrorResponse"
      
  Conflict:
    description: 资源冲突（如重复点赞）
    schema:
      $ref: "#/definitions/ErrorResponse"
      
  ServerError:
    description: 服务器内部错误
    schema:
      $ref: "#/definitions/ErrorResponse"

# 数据模型定义
definitions:
  # ==================== 基础响应模型 ====================
  
  ApiResponse:
    type: object
    properties:
      code:
        type: integer
        example: 0
        description: 业务状态码，0表示成功
      message:
        type: string
        example: "success"
        description: 提示信息
      data:
        type: object
        description: 响应数据
    required:
      - code
      - message
      
  ErrorResponse:
    allOf:
      - $ref: "#/definitions/ApiResponse"
      - type: object
        properties:
          data:
            type: object
            properties:
              error_code:
                type: string
                description: 错误码
              details:
                type: array
                items:
                  type: string
                description: 详细错误信息
                
  PaginationInfo:
    type: object
    properties:
      total:
        type: integer
        description: 总记录数
      page:
        type: integer
        description: 当前页码
      page_size:
        type: integer
        description: 每页数量
      total_pages:
        type: integer
        description: 总页数
      has_next:
        type: boolean
        description: 是否有下一页
      has_prev:
        type: boolean
        description: 是否有上一页
        
  PaginatedResponse:
    allOf:
      - $ref: "#/definitions/ApiResponse"
      - type: object
        properties:
          data:
            type: object
            properties:
              list:
                type: array
                description: 数据列表
              pagination:
                $ref: "#/definitions/PaginationInfo"

  # ==================== 用户相关模型 ====================
  
  UserBase:
    type: object
    properties:
      id:
        type: integer
        format: int64
        example: 10001
      nickname:
        type: string
        example: "张三"
      avatar_url:
        type: string
        example: "https://example.com/avatar.jpg"
        
  UserInfo:
    allOf:
      - $ref: "#/definitions/UserBase"
      - type: object
        properties:
          openid:
            type: string
            description: 微信openid（仅自己或管理员可见）
          unionid:
            type: string
          user_type:
            type: integer
            enum: [1, 2, 3]
            description: "1-前台用户，2-普通管理员，3-系统管理员"
          status:
            type: integer
            enum: [0, 1]
            description: "0-冻结，1-正常"
          freeze_end_time:
            type: string
            format: date-time
            description: 冻结结束时间
          created_at:
            type: string
            format: date-time
          tags:
            type: array
            items:
              $ref: "#/definitions/UserTag"
              
  UserTag:
    type: object
    properties:
      id:
        type: integer
      tag_name:
        type: string
        example: "VIP用户"

  Attribute:
    type: object
    properties:
      id:
        type: integer
      name:
        type: string
        example: "性别"
      created_at:
        type: string
        format: date-time
      updated_at:
        type: string
        format: date-time

  UserAttribute:
    type: object
    properties:
      id:
        type: integer
      user_id:
        type: integer
      attribute_id:
        type: integer
      value:
        type: string
        example: "男"
      created_at:
        type: string
        format: date-time
      updated_at:
        type: string
        format: date-time
      attribute:
        $ref: "#/definitions/Attribute"
        
  AdminUserInfo:
    allOf:
      - $ref: "#/definitions/UserInfo"
      - type: object
        properties:
          email:
            type: string
            format: email
          last_login_at:
            type: string
            format: date-time
            
  UserProfileUpdate:
    type: object
    properties:
      nickname:
        type: string
        maxLength: 64
      avatar_url:
        type: string
        maxLength: 255
        
  # ==================== 认证相关模型 ====================
  
  WechatLoginRequest:
    type: object
    properties:
      code:
        type: string
        description: 微信登录临时凭证（wx.login获取）
      encrypted_data:
        type: string
        description: 加密数据（可选，用于获取手机号）
      iv:
        type: string
        description: 加密算法的初始向量
    required:
      - code
      
  AdminLoginRequest:
    type: object
    properties:
      email:
        type: string
        format: email
      password:
        type: string
        format: password
        minLength: 6
      captcha:
        type: string
        description: 图形验证码
    required:
      - email
      - password
      
  LoginResponse:
    allOf:
      - $ref: "#/definitions/ApiResponse"
      - type: object
        properties:
          data:
            type: object
            properties:
              access_token:
                type: string
                example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
              token_type:
                type: string
                example: "Bearer"
              expires_in:
                type: integer
                example: 7200
                description: Token有效期（秒）
              user_info:
                $ref: "#/definitions/UserInfo"
                
  # ==================== 权限相关模型 ====================
  
  Role:
    type: object
    properties:
      id:
        type: integer
      name:
        type: string
        example: "内容编辑"
      description:
        type: string
      parent_id:
        type: integer
        default: 0
        description: 父角色ID
      level:
        type: integer
        description: 层级
      is_builtin:
        type: integer
        enum: [0, 1]
        description: 是否内置角色
      created_at:
        type: string
        format: date-time
        
  RoleCreate:
    type: object
    properties:
      name:
        type: string
        maxLength: 64
      description:
        type: string
        maxLength: 255
      parent_id:
        type: integer
        default: 0
      permission_ids:
        type: array
        items:
          type: integer
        description: 关联的权限ID列表
    required:
      - name
      
  RoleUpdate:
    allOf:
      - $ref: "#/definitions/RoleCreate"
      
  Permission:
    type: object
    properties:
      id:
        type: integer
      name:
        type: string
        example: "文章创建"
      code:
        type: string
        example: "article:create"
      type:
        type: integer
        enum: [1, 2, 3]
        description: "1-菜单，2-按钮，3-接口"
      parent_id:
        type: integer
      level:
        type: integer
      is_builtin:
        type: integer
        enum: [0, 1]
        
  PermissionTree:
    allOf:
      - $ref: "#/definitions/Permission"
      - type: object
        properties:
          children:
            type: array
            items:
              $ref: "#/definitions/PermissionTree"
              
  # ==================== 内容管理模型 ====================
  
  Module:
    type: object
    properties:
      id:
        type: integer
      title:
        type: string
        example: "前端开发"
      description:
        type: string
      sort_order:
        type: integer
        default: 0
      status:
        type: integer
        enum: [0, 1]
        description: "0-禁用，1-启用"
      created_at:
        type: string
        format: date-time
        
  ModuleCreate:
    type: object
    properties:
      title:
        type: string
        maxLength: 128
      description:
        type: string
      sort_order:
        type: integer
        default: 0
    required:
      - title
      
  ModulePage:
    type: object
    properties:
      id:
        type: integer
      module_id:
        type: integer
      title:
        type: string
      content:
        type: string
        description: 富文本内容
      content_type:
        type: integer
        enum: [1, 2]
        description: "1-富文本，2-HTML"
      sort_order:
        type: integer
        
  ModulePageCreate:
    type: object
    properties:
      title:
        type: string
        maxLength: 128
      content:
        type: string
      content_type:
        type: integer
        default: 1
      sort_order:
        type: integer
        default: 0
    required:
      - title
      
  # 文章相关
  ArticleBase:
    type: object
    properties:
      id:
        type: integer
        format: int64
      title:
        type: string
        example: "深入理解React Hooks"
      summary:
        type: string
      cover_image:
        type: string
      author:
        $ref: "#/definitions/UserBase"
      module_id:
        type: integer
      view_count:
        type: integer
        default: 0
      like_count:
        type: integer
        default: 0
      collect_count:
        type: integer
        default: 0
      comment_count:
        type: integer
        default: 0
      share_count:
        type: integer
        default: 0
        
  ArticleListItem:
    allOf:
      - $ref: "#/definitions/ArticleBase"
      - type: object
        properties:
          status:
            type: integer
            enum: [0, 1, 2]
            description: "0-草稿，1-已发布，2-定时发布"
          publish_time:
            type: string
            format: date-time
          created_at:
            type: string
            format: date-time
          is_liked:
            type: boolean
            description: 当前用户是否点赞（登录后）
          is_collected:
            type: boolean
            description: 当前用户是否收藏（登录后）
            
  ArticleDetail:
    allOf:
      - $ref: "#/definitions/ArticleListItem"
      - type: object
        properties:
          content:
            type: string
            description: 完整内容
          content_type:
            type: integer
            enum: [1, 2, 3]
            description: "1-富文本，2-HTML，3-Markdown"
          permissions:
            type: array
            items:
              $ref: "#/definitions/ContentPermission"
            description: 查看权限配置
            
  ArticleCreate:
    type: object
    properties:
      title:
        type: string
        maxLength: 200
      summary:
        type: string
        maxLength: 500
      content:
        type: string
      content_type:
        type: integer
        default: 1
      cover_image:
        type: string
        maxLength: 255
      module_id:
        type: integer
      status:
        type: integer
        default: 0
        enum: [0, 1, 2]
      publish_time:
        type: string
        format: date-time
        description: 定时发布时间（status=2时必填）
      role_permissions:
        type: array
        items:
          type: integer
        description: 可查看的角色ID列表，空表示公开
    required:
      - title
      - content
      
  ArticleUpdate:
    allOf:
      - $ref: "#/definitions/ArticleCreate"
      
  # 课程相关
  CourseBase:
    type: object
    properties:
      id:
        type: integer
        format: int64
      title:
        type: string
        example: "Go语言从入门到精通"
      description:
        type: string
      cover_image:
        type: string
      video_url:
        type: string
        description: 预览视频或首课视频
      duration:
        type: integer
        description: 总课时（分钟）
      author:
        $ref: "#/definitions/UserBase"
      module_id:
        type: integer
      price:
        type: number
        format: decimal
        default: 0.00
        description: 价格，0表示免费
      view_count:
        type: integer
        default: 0
      like_count:
        type: integer
        default: 0
      collect_count:
        type: integer
        default: 0
      comment_count:
        type: integer
        default: 0
      share_count:
        type: integer
        default: 0
      study_count:
        type: integer
        default: 0
        description: 学习人数
        
  CourseListItem:
    allOf:
      - $ref: "#/definitions/CourseBase"
      - type: object
        properties:
          status:
            type: integer
            enum: [0, 1, 2]
          publish_time:
            type: string
            format: date-time
          created_at:
            type: string
            format: date-time
          is_liked:
            type: boolean
          is_collected:
            type: boolean
          progress:
            type: integer
            description: 当前用户学习进度（秒），未学习为0
            
  CourseDetail:
    allOf:
      - $ref: "#/definitions/CourseListItem"
      - type: object
        properties:
          units:
            type: array
            items:
              $ref: "#/definitions/CourseUnit"
          permissions:
            type: array
            items:
              $ref: "#/definitions/ContentPermission"
              
  CourseCreate:
    type: object
    properties:
      title:
        type: string
        maxLength: 200
      description:
        type: string
      cover_image:
        type: string
      price:
        type: number
        default: 0.00
      module_id:
        type: integer
      status:
        type: integer
        default: 0
      publish_time:
        type: string
        format: date-time
      role_permissions:
        type: array
        items:
          type: integer
    required:
      - title
      
  CourseUpdate:
    allOf:
      - $ref: "#/definitions/CourseCreate"
      
  CourseUnit:
    type: object
    properties:
      id:
        type: integer
        format: int64
      course_id:
        type: integer
        format: int64
      title:
        type: string
      video_url:
        type: string
      duration:
        type: integer
        description: 课时（分钟）
      sort_order:
        type: integer
      status:
        type: integer
        enum: [0, 1]
        
  CourseUnitCreate:
    type: object
    properties:
      title:
        type: string
        maxLength: 200
      video_url:
        type: string
        maxLength: 255
      duration:
        type: integer
      sort_order:
        type: integer
        default: 0
    required:
      - title
      
  ContentPermission:
    type: object
    properties:
      id:
        type: integer
      content_type:
        type: integer
      content_id:
        type: integer
        format: int64
      role_id:
        type: integer
        description: null表示公开
      role_name:
        type: string
        
  # ==================== 互动相关模型 ====================
  
  StudyRecord:
    type: object
    properties:
      course_id:
        type: integer
        format: int64
      unit_id:
        type: integer
        format: int64
      progress:
        type: integer
        description: 学习进度（秒）
      status:
        type: integer
        enum: [0, 1, 2]
        description: "0-未开始，1-学习中，2-已完成"
      last_study_at:
        type: string
        format: date-time
        
  StudyRecordUpdate:
    type: object
    properties:
      unit_id:
        type: integer
        format: int64
      progress:
        type: integer
        description: 当前观看进度（秒）
      status:
        type: integer
        enum: [1, 2]
    required:
      - unit_id
      - progress
      
  Collection:
    type: object
    properties:
      id:
        type: integer
        format: int64
      content_type:
        type: integer
        enum: [1, 2]
      content_id:
        type: integer
        format: int64
      content_title:
        type: string
      cover_image:
        type: string
      created_at:
        type: string
        format: date-time
        
  LikeInfo:
    type: object
    properties:
      content_type:
        type: integer
      content_id:
        type: integer
        format: int64
      is_liked:
        type: boolean
      like_count:
        type: integer
        
  Comment:
    type: object
    properties:
      id:
        type: integer
        format: int64
      user:
        $ref: "#/definitions/UserBase"
      content:
        type: string
      parent_id:
        type: integer
        format: int64
        default: 0
        description: 回复的评论ID
      status:
        type: integer
        enum: [0, 1, 2]
        description: "0-待审核，1-通过，2-拒绝"
      created_at:
        type: string
        format: date-time
      replies:
        type: array
        items:
          $ref: "#/definitions/Comment"
        description: 子评论列表（嵌套）
        
  CommentCreate:
    type: object
    properties:
      content:
        type: string
        minLength: 1
        maxLength: 1000
      parent_id:
        type: integer
        format: int64
        default: 0
    required:
      - content
      
  # ==================== 消息通知模型 ====================
  
  Notification:
    type: object
    properties:
      id:
        type: integer
        format: int64
      type:
        type: integer
        enum: [1, 2, 3, 4]
        description: "1-系统通知，2-评论回复，3-学习提醒，4-点赞通知"
      title:
        type: string
      content:
        type: string
      is_read:
        type: boolean
      created_at:
        type: string
        format: date-time
        
  # ==================== 系统管理模型 ====================
  
  WechatConfig:
    type: object
    properties:
      app_id:
        type: string
      api_token:
        type: string
      ticket_expires_at:
        type: string
        format: date-time
      token_expires_at:
        type: string
        format: date-time
      status:
        type: integer
        
  WechatConfigUpdate:
    type: object
    properties:
      app_id:
        type: string
        maxLength: 32
      app_secret:
        type: string
        maxLength: 64
      api_token:
        type: string
        maxLength: 255
    required:
      - app_id
      - app_secret
      
  AuditLog:
    type: object
    properties:
      id:
        type: integer
        format: int64
      username:
        type: string
      action:
        type: string
      module:
        type: string
      description:
        type: string
      ip_address:
        type: string
      user_agent:
        type: string
      request_data:
        type: object
      created_at:
        type: string
        format: date-time
        
  LogConfig:
    type: object
    properties:
      retention_days:
        type: integer
        default: 90
        description: 日志保留天数

# API 路径定义
paths:
  # ==================== 认证模块 ====================
  
  /auth/wechat-login:
    post:
      tags:
        - 认证
      summary: 微信登录（小程序）
      description: 通过微信临时登录凭证获取JWT Token
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/WechatLoginRequest"
      responses:
        200:
          description: 登录成功
          schema:
            $ref: "#/definitions/LoginResponse"
        400:
          $ref: "#/responses/BadRequest"
        401:
          description: 微信认证失败
          schema:
            $ref: "#/definitions/ErrorResponse"
            
  /auth/admin-login:
    post:
      tags:
        - 认证
      summary: 管理员登录
      description: 邮箱密码登录，需要图形验证码
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/AdminLoginRequest"
      responses:
        200:
          description: 登录成功
          schema:
            $ref: "#/definitions/LoginResponse"
        400:
          $ref: "#/responses/BadRequest"
        401:
          description: 账号或密码错误
          schema:
            $ref: "#/definitions/ErrorResponse"
            
  /auth/refresh:
    post:
      tags:
        - 认证
