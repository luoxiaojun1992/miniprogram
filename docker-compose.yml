version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - APP_SERVER_PORT=8080
      - APP_SERVER_MODE=debug
      - APP_DATABASE_HOST=mysql
      - APP_DATABASE_PORT=3306
      - APP_DATABASE_USER=root
      - APP_DATABASE_PASSWORD=secret
      - APP_DATABASE_NAME=miniapp
      - APP_JWT_SECRET=change-me-in-production
      - APP_JWT_EXPIRY=7200
      - APP_LOG_LEVEL=debug
      - APP_UPLOAD_DIR=storage/uploads
      - APP_UPLOAD_BASE_URL=http://localhost:8080/static
      - APP_REDIS_HOST=redis
      - APP_REDIS_PORT=6379
      - APP_RATE_LIMIT_ENABLED=true
      - APP_RATE_LIMIT_REQUESTS=300
      - APP_RATE_LIMIT_WINDOW_SECONDS=60
    volumes:
      - ./storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: miniapp
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  migrate:
    image: migrate/migrate:v4.17.0
    volumes:
      - ./migrations:/migrations:ro
    command: ["-path", "/migrations", "-database", "mysql://root:secret@tcp(mysql:3306)/miniapp?multiStatements=true", "up"]
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

volumes:
  mysql-data:

networks:
  app-network:
    driver: bridge
