version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - APP_SERVER_PORT=8080
      - APP_DATABASE_HOST=mysql
      - APP_DATABASE_PORT=3306
      - APP_DATABASE_USER=root
      - APP_DATABASE_PASSWORD=secret
      - APP_DATABASE_NAME=miniapp
      - APP_LOG_LEVEL=debug
    volumes:
      - ./configs:/app/configs:ro
      - ./storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: miniapp
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  migrate:
    image: migrate/migrate:v4.17.0
    volumes:
      - ./migrations:/migrations:ro
    command: ["-path", "/migrations", "-database", "mysql://root:secret@tcp(mysql:3306)/miniapp?multiStatements=true", "up"]
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

volumes:
  mysql-data:

networks:
  app-network:
    driver: bridge
